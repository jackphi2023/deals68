<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập Admin | Deals68</title>
<meta name="description" content="Đăng nhập quản trị nội bộ Deals68.">
<meta name="robots" content="noindex,noarchive,nofollow">
<link rel="canonical" href="https://deals68.com/admin/login">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0F2A4A">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Deals68.com">
<meta property="og:title" content="Đăng nhập Admin | Deals68">
<meta property="og:description" content="Đăng nhập quản trị nội bộ Deals68.">
<meta property="og:image" content="assets/og-image.png">
<meta property="og:url" content="https://deals68.com/admin/login">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Đăng nhập Admin | Deals68">
<meta name="twitter:description" content="Đăng nhập quản trị nội bộ Deals68.">
<meta name="twitter:image" content="assets/og-image.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="assets/deals68-investors-import.js"></script>
<script src="assets/deals68-mock.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', system-ui, sans-serif; color: #0F2A4A; background: linear-gradient(180deg,#0F2A4A,#14315A); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  select, input, button { font-family: inherit; }
</style>
</helmet>

<div style="width:100%; min-height:100vh; overflow-x:hidden; display:flex; align-items:center; justify-content:center; padding:40px 24px;">
  <div style="width:100%; max-width:400px;">
    <div style="text-align:center; margin-bottom:26px;">
      <img src="assets/logo-white.png" alt="Deals68.com" style="height:32px; margin-bottom:18px;">
      <div style="display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700; color:#cfe8f6; text-transform:uppercase; letter-spacing:.6px;">🔐 Admin Panel</div>
    </div>

    <div style="background:#fff; border-radius:18px; padding:30px; box-shadow:0 20px 50px rgba(6,20,40,.4);">
      <h1 style="font-size:20px; font-weight:800; margin:0 0 20px; text-align:center;">Đăng nhập Admin</h1>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <label style="display:flex; flex-direction:column; gap:6px;">
          <span style="font-size:12.5px; font-weight:700; color:#334155;">Email</span>
          <input value="{{ email }}" onInput="{{ onEmail }}" placeholder="admin@deals68.com" style="{{ inputStyle }}">
        </label>
        <label style="display:flex; flex-direction:column; gap:6px;">
          <span style="font-size:12.5px; font-weight:700; color:#334155;">Mật khẩu</span>
          <input type="password" value="{{ password }}" onInput="{{ onPassword }}" placeholder="••••••••" style="{{ inputStyle }}">
        </label>
        <sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
          <div style="background:#FDECEC; border:1px solid #F8B4B4; color:#B91C1C; font-size:13px; font-weight:600; padding:11px 14px; border-radius:10px;">⚠ {{ errorMsg }}</div>
        </sc-if>
        <button onClick="{{ submit }}" style="background:#0F2A4A; color:#fff; font-weight:700; font-size:15.5px; padding:13px; border-radius:11px; border:none; cursor:pointer; margin-top:4px;" style-hover="background:#14315A;">Đăng nhập</button>
      </div>
      <div style="margin-top:18px; padding-top:16px; border-top:1px solid #EEF2F6; font-size:12.5px; color:#94A3B8; text-align:center;">
        Demo: <b style="color:#64748B;">admin@deals68.com</b> / <b style="color:#64748B;">deals68admin</b>
      </div>
    </div>
    <p style="text-align:center; font-size:13px; color:#a9bdd4; margin-top:18px;"><a href="Deals68 Login.dc.html" style="color:#a9bdd4; text-decoration:underline;">← Đăng nhập người dùng</a></p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email:'', password:'', error:'' };

  submit() {
    const email = (this.state.email || '').trim().toLowerCase();
    const password = this.state.password || '';
    if (email === 'admin@deals68.com' && password === 'deals68admin') {
      try { window.D68 && window.D68.logAudit && window.D68.logAudit('admin_login', email); } catch(e){}
      location.href = 'Deals68 Admin.dc.html';
    } else {
      this.setState({ error: 'Sai email hoặc mật khẩu Admin.' });
    }
  }

  renderVals() {
    const st = this.state;
    const inputStyle = 'border:1px solid #E2E8F0; border-radius:10px; padding:12px 13px; font-size:15px; color:#0F2A4A; background:#F7FAFC; font-weight:500; outline:none; width:100%;';
    return {
      inputStyle,
      email: st.email, onEmail: (e)=>this.setState({ email:e.target.value }),
      password: st.password, onPassword: (e)=>this.setState({ password:e.target.value }),
      hasError: !!st.error, errorMsg: st.error,
      submit: ()=>this.submit()
    };
  }
}
</script>
</body>
</html>
