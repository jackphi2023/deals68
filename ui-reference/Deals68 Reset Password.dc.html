<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đặt lại mật khẩu | Deals68</title>
<meta name="description" content="Đặt lại mật khẩu tài khoản Deals68.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://deals68.com/reset-password">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0F2A4A">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Deals68.com">
<meta property="og:title" content="Đặt lại mật khẩu | Deals68">
<meta property="og:description" content="Đặt lại mật khẩu tài khoản Deals68.">
<meta property="og:image" content="assets/og-image.png">
<meta property="og:url" content="https://deals68.com/reset-password">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Đặt lại mật khẩu | Deals68">
<meta name="twitter:description" content="Đặt lại mật khẩu tài khoản Deals68.">
<meta name="twitter:image" content="assets/og-image.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="assets/deals68-investors-import.js"></script>
<script src="assets/deals68-mock.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', system-ui, sans-serif; color: #0F2A4A; background: #F7FAFC; -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  select, input, button { font-family: inherit; }
</style>
</helmet>

<div style="width:100%; min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column;">

  <header style="background:rgba(255,255,255,.94); border-bottom:1px solid #E7EDF3;">
    <div style="max-width:1000px; margin:0 auto; padding:0 24px; height:70px; display:flex; align-items:center;">
      <a href="Deals68 Home.dc.html" style="display:flex; align-items:center;"><img src="assets/logo-beta.png" alt="Deals68.com" style="height:34px; display:block;"></a>
    </div>
  </header>

  <section style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px;">
    <div style="width:100%; max-width:440px;">

      <sc-if value="{{ !done }}" hint-placeholder-val="{{ true }}">
        <div style="text-align:center; margin-bottom:24px;">
          <h1 style="font-size:26px; font-weight:800; letter-spacing:-.6px; margin:0 0 6px;">Đặt lại mật khẩu</h1>
          <p style="font-size:14.5px; color:#64748B; margin:0;">Tài khoản {{ roleLabel }}: <b>{{ username }}</b></p>
        </div>
        <div style="background:#fff; border:1px solid #E7EDF3; border-radius:18px; padding:28px; box-shadow:0 1px 2px rgba(15,42,74,.04);">
          <div style="display:flex; flex-direction:column; gap:14px;">
            <label style="display:flex; flex-direction:column; gap:6px;">
              <span style="font-size:12.5px; font-weight:700; color:#334155;">Mật khẩu mới</span>
              <input type="password" value="{{ newPass }}" onInput="{{ onNewPass }}" placeholder="Tối thiểu 6 ký tự" style="{{ inputStyle }}">
            </label>
            <label style="display:flex; flex-direction:column; gap:6px;">
              <span style="font-size:12.5px; font-weight:700; color:#334155;">Xác nhận mật khẩu mới</span>
              <input type="password" value="{{ confirmPass }}" onInput="{{ onConfirmPass }}" style="{{ inputStyle }}">
            </label>
            <sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
              <div style="background:#FDECEC; border:1px solid #F8B4B4; color:#B91C1C; font-size:13px; font-weight:600; padding:11px 14px; border-radius:10px;">⚠ {{ errorMsg }}</div>
            </sc-if>
            <button onClick="{{ submit }}" style="background:#F2B51D; color:#0F2A4A; font-weight:800; font-size:15.5px; padding:13px; border-radius:11px; border:none; cursor:pointer;" style-hover="background:#e0a70f;">Cập nhật mật khẩu</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ done }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fff; border:1px solid #E7EDF3; border-radius:18px; padding:32px; text-align:center; box-shadow:0 1px 2px rgba(15,42,74,.04);">
          <div style="font-size:38px; margin-bottom:14px;">✅</div>
          <h2 style="font-size:19px; font-weight:800; margin:0 0 8px;">Đổi mật khẩu thành công</h2>
          <p style="font-size:14px; color:#64748B; line-height:1.6; margin:0 0 20px;">Bạn có thể đăng nhập lại bằng mật khẩu mới.</p>
          <a href="Deals68 Login.dc.html?role={{ role }}" style="display:inline-block; background:#0F2A4A; color:#fff; font-weight:700; font-size:15px; padding:12px 26px; border-radius:11px;">Đăng nhập ngay →</a>
        </div>
      </sc-if>

    </div>
  </section>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { role:'business', username:'', newPass:'', confirmPass:'', error:'', done:false };

  componentDidMount() {
    try {
      var p = new URLSearchParams(location.search);
      var r = p.get('role'), u = p.get('u');
      this.setState({
        role: (r && ['business','investor','advisor'].indexOf(r)!==-1) ? r : 'business',
        username: u || ''
      });
    } catch(e) {}
  }

  submit() {
    const st = this.state;
    if (!st.newPass || st.newPass.length < 6) { this.setState({ error:'Mật khẩu mới cần tối thiểu 6 ký tự.' }); return; }
    if (st.newPass !== st.confirmPass) { this.setState({ error:'Xác nhận mật khẩu không khớp.' }); return; }
    const ok = window.D68.updateCredentialPassword(st.role, st.username, st.newPass);
    if (!ok) { window.D68.addCredential(st.role, st.username, st.newPass, st.username); }
    this.setState({ done:true, error:'' });
  }

  renderVals() {
    const st = this.state;
    const inputStyle = 'border:1px solid #E2E8F0; border-radius:10px; padding:12px 13px; font-size:15px; color:#0F2A4A; background:#F7FAFC; font-weight:500; outline:none; width:100%;';
    const roleLabelMap = { business:'Doanh nghiệp', investor:'Nhà đầu tư', advisor:'Cố vấn' };
    return {
      role: st.role, roleLabel: roleLabelMap[st.role], username: st.username,
      inputStyle,
      newPass: st.newPass, onNewPass: (e)=>this.setState({ newPass:e.target.value }),
      confirmPass: st.confirmPass, onConfirmPass: (e)=>this.setState({ confirmPass:e.target.value }),
      hasError: !!st.error, errorMsg: st.error,
      submit: ()=>this.submit(), done: st.done
    };
  }
}
</script>
</body>
</html>
