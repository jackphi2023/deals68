<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập | Deals68</title>
<meta name="description" content="Đăng nhập tài khoản Business, Investor, Advisor hoặc Affiliate trên Deals68.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://deals68.com/login">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0F2A4A">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Deals68.com">
<meta property="og:title" content="Đăng nhập | Deals68">
<meta property="og:description" content="Đăng nhập tài khoản Business, Investor, Advisor hoặc Affiliate trên Deals68.">
<meta property="og:image" content="assets/og-image.png">
<meta property="og:url" content="https://deals68.com/login">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Đăng nhập | Deals68">
<meta name="twitter:description" content="Đăng nhập tài khoản Business, Investor, Advisor hoặc Affiliate trên Deals68.">
<meta name="twitter:image" content="assets/og-image.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="assets/deals68-investors-import.js"></script>
<script src="assets/deals68-mock.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', system-ui, sans-serif; color: #0F2A4A; background: #F7FAFC; -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  select, input, button { font-family: inherit; }
</style>
</helmet>

<div style="width:100%; min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column;">

  <header style="background:rgba(255,255,255,.94); border-bottom:1px solid #E7EDF3;">
    <div style="max-width:1000px; margin:0 auto; padding:0 24px; height:70px; display:flex; align-items:center;">
      <a href="Deals68 Home.dc.html" style="display:flex; align-items:center;"><img src="assets/logo-beta.png" alt="Deals68.com" style="height:34px; display:block;"></a>
    </div>
  </header>

  <section style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px;">
    <div style="width:100%; max-width:440px;">
      <div style="text-align:center; margin-bottom:24px;">
        <h1 style="font-size:26px; font-weight:800; letter-spacing:-.6px; margin:0 0 6px;">Đăng nhập Deals68</h1>
        <p style="font-size:14.5px; color:#64748B; margin:0;">Chọn vai trò và đăng nhập vào tài khoản của bạn.</p>
      </div>

      <div style="display:flex; gap:4px; background:#EEF2F6; border-radius:12px; padding:4px; margin-bottom:20px;">
        <sc-for list="{{ roleTabs }}" as="r" hint-placeholder-count="3">
          <button onClick="{{ r.onClick }}" style="{{ r.style }}">{{ r.label }}</button>
        </sc-for>
      </div>

      <sc-if value="{{ gated }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fff; border:1px solid #E7EDF3; border-radius:18px; padding:30px; box-shadow:0 1px 2px rgba(15,42,74,.04); text-align:center;">
          <div style="font-size:38px; margin-bottom:12px;">{{ gateIcon }}</div>
          <h2 style="font-size:18.5px; font-weight:800; margin:0 0 10px;">{{ gateTitle }}</h2>
          <p style="font-size:14px; color:#64748B; line-height:1.6; margin:0 0 16px;">{{ gateDesc }}</p>
          <sc-if value="{{ gateHasOrder }}" hint-placeholder-val="{{ false }}">
            <p style="font-size:13px; color:#94A3B8; margin:0 0 20px;">Mã đơn: <b style="color:#B8860B;">{{ gateOrderCode }}</b><sc-if value="{{ gateHasDays }}" hint-placeholder-val="{{ false }}"> · {{ gateDaysLeft }}</sc-if></p>
          </sc-if>
          <button onClick="{{ gateBack }}" style="background:#EEF2F6; color:#334155; font-weight:700; font-size:14px; padding:11px 22px; border-radius:10px; border:none; cursor:pointer;">Quay lại đăng nhập</button>
        </div>
      </sc-if>

      <sc-if value="{{ !gated }}" hint-placeholder-val="{{ true }}">
      <div style="background:#fff; border:1px solid #E7EDF3; border-radius:18px; padding:28px; box-shadow:0 1px 2px rgba(15,42,74,.04);">
        <div style="display:flex; flex-direction:column; gap:14px;">
          <label style="display:flex; flex-direction:column; gap:6px;">
            <span style="font-size:12.5px; font-weight:700; color:#334155;">{{ userFieldLabel }}</span>
            <input value="{{ username }}" onInput="{{ onUsername }}" placeholder="{{ userFieldPlaceholder }}" style="{{ inputStyle }}">
          </label>
          <label style="display:flex; flex-direction:column; gap:6px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span style="font-size:12.5px; font-weight:700; color:#334155;">Mật khẩu</span>
              <a href="{{ forgotHref }}" style="font-size:12.5px; font-weight:600; color:#1596cc;">Quên mật khẩu?</a>
            </div>
            <input type="password" value="{{ password }}" onInput="{{ onPassword }}" placeholder="••••••••" style="{{ inputStyle }}">
          </label>

          <sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
            <div style="background:#FDECEC; border:1px solid #F8B4B4; color:#B91C1C; font-size:13px; font-weight:600; padding:11px 14px; border-radius:10px;">⚠ {{ errorMsg }}</div>
          </sc-if>

          <button onClick="{{ submit }}" style="background:#0F2A4A; color:#fff; font-weight:700; font-size:15.5px; padding:13px; border-radius:11px; border:none; cursor:pointer; margin-top:4px;" style-hover="background:#14315A;">Đăng nhập</button>
        </div>

        <div style="margin-top:18px; padding-top:16px; border-top:1px solid #EEF2F6; font-size:12.5px; color:#94A3B8; line-height:1.6;">
          <b style="color:#64748B;">Tài khoản demo ({{ roleLabel }}):</b><br>{{ demoHint }}
        </div>
      </div>
      </sc-if>

      <p style="text-align:center; font-size:13.5px; color:#64748B; margin-top:18px;">
        Chưa có tài khoản? <a href="{{ registerHref }}" style="font-weight:700; color:#1596cc;">Đăng ký {{ roleLabelLower }}</a>
      </p>
    </div>
  </section>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { role:'business', username:'', password:'', error:'', gated:false, gateAcct:null };

  componentDidMount() {
    try {
      var p = new URLSearchParams(location.search);
      var r = p.get('role');
      if (r && ['business','investor','advisor','affiliate'].indexOf(r) !== -1) this.setState({ role:r });
    } catch(e) {}
  }

  submit() {
    const D68 = window.D68;
    const role = this.state.role;
    const username = (this.state.username || '').trim();
    const password = this.state.password || '';
    if (!username || !password) { this.setState({ error: 'Vui lòng nhập đầy đủ thông tin đăng nhập.' }); return; }
    const found = D68.findCredential(role, username, password);
    if (!found) {
      const exists = D68.findCredentialByUsername(role, username);
      this.setState({ error: exists ? 'Sai mật khẩu. Vui lòng thử lại hoặc dùng "Quên mật khẩu?".' : 'Không tìm thấy tài khoản này. Kiểm tra lại tên đăng nhập hoặc đăng ký mới.' });
      return;
    }
    const acct = D68.getAccountState(role, found.id);
    if (!D68.canAccessDashboard(acct)) {
      this.setState({ gated: true, gateAcct: acct, error: '' });
      return;
    }
    // Real investorCode comes from the account's own state (set at registration); the hardcoded sample account is the only fallback.
    const invCode = role==='investor' ? (acct.code || (D68.INVESTOR_SAMPLE_ACCOUNT.username===username ? D68.INVESTOR_SAMPLE_ACCOUNT.investorCode : undefined)) : undefined;
    D68.setSession({ role: role, id: found.id, name: found.id, investorCode: invCode });
    if (role === 'business') location.href = 'Deals68 Business Dashboard.dc.html?biz=' + encodeURIComponent(found.id);
    else if (role === 'investor') location.href = 'Deals68 Investor Dashboard.dc.html?inv=' + encodeURIComponent(found.id);
    else if (role === 'affiliate') location.href = 'Deals68 Affiliate Dashboard.dc.html?aff=' + encodeURIComponent(found.id);
    else if (role === 'advisor') location.href = 'Deals68 Advisor Dashboard.dc.html?adv=' + encodeURIComponent(found.id);
    else location.href = 'Deals68 Businesses.dc.html';
  }

  renderVals() {
    const st = this.state;
    const inputStyle = 'border:1px solid #E2E8F0; border-radius:10px; padding:12px 13px; font-size:15px; color:#0F2A4A; background:#F7FAFC; font-weight:500; outline:none; width:100%;';
    const roleDefs = [
      { key:'business', label:'Doanh nghiệp' },
      { key:'investor', label:'Nhà đầu tư' },
      { key:'advisor', label:'Cố vấn' },
      { key:'affiliate', label:'Affiliate' }
    ];
    const roleTabs = roleDefs.map(r => ({
      label: r.label, onClick: ()=>this.setState({ role:r.key, error:'' }),
      style: `flex:1; padding:10px; border:none; border-radius:9px; cursor:pointer; font-size:14px; font-weight:${st.role===r.key?'700':'500'}; background:${st.role===r.key?'#fff':'transparent'}; color:${st.role===r.key?'#0F2A4A':'#64748B'}; box-shadow:${st.role===r.key?'0 1px 3px rgba(15,42,74,.12)':'none'};`
    }));

    const roleLabel = roleDefs.find(r=>r.key===st.role).label;
    const userFieldLabel = st.role==='business' ? 'Tên đăng nhập' : 'Email';
    const userFieldPlaceholder = st.role==='business' ? 'Tên đăng nhập' : 'email@example.com';
    const demoAff = (window.D68 && window.D68.getAffiliateState) ? window.D68.getAffiliateState() : { email:'affiliate@deals68.com' };
    const demoHintMap = {
      business: 'demo_business / deals68demo',
      investor: 'demo_investor / deals68demo',
      advisor: 'Đăng ký mới ở trang Đăng ký Cố vấn để tạo tài khoản demo.',
      affiliate: demoAff.email + ' / deals68aff'
    };
    const registerHrefMap = { business:'Deals68 Register Business.dc.html', investor:'Deals68 Register Investor.dc.html', advisor:'Deals68 Register Advisor.dc.html', affiliate:'Deals68 Register Affiliate.dc.html' };

    const D68 = window.D68;
    let gateVals = { gated:false, gateIcon:'', gateTitle:'', gateDesc:'', gateHasOrder:false, gateOrderCode:'', gateHasDays:false, gateDaysLeft:'', gateBack: ()=>this.setState({ gated:false, gateAcct:null, error:'' }) };
    if (st.gated && st.gateAcct && D68) {
      const acct = st.gateAcct;
      const statusMap = {
        payment_pending: { icon:'🕒', title:'Hồ sơ đang chờ xác nhận thanh toán', desc:'Dashboard chưa mở. Hồ sơ của bạn đã được lưu trong 7 ngày — vui lòng chuyển khoản đúng nội dung để Admin xác nhận.' },
        pending_admin_review: role === 'affiliate'
          ? { icon:'⏳', title:'Hồ sơ đang chờ Admin duyệt', desc:'Đăng ký Affiliate đã ghi nhận. Dashboard sẽ mở ngay khi Admin duyệt xong hồ sơ — không cần thanh toán.' }
          : { icon:'⏳', title:'Hồ sơ đang chờ Admin duyệt', desc:'Thanh toán đã được ghi nhận. Dashboard sẽ mở ngay khi Admin duyệt xong nội dung hồ sơ.' },
        expired: { icon:'⌛', title:'Hồ sơ đã hết hạn', desc:'Quá 7 ngày chưa xác nhận thanh toán nên hồ sơ đã tự động ẩn. Vui lòng đăng ký lại hoặc liên hệ partner@deals68.com.' },
        hidden: { icon:'🚫', title:'Tài khoản đang bị tạm ngưng', desc:'Tài khoản này đang bị Admin tạm ngưng quyền truy cập. Vui lòng liên hệ partner@deals68.com để biết thêm chi tiết.' },
        draft: { icon:'📝', title:'Hồ sơ chưa hoàn tất', desc:'Vui lòng hoàn tất đăng ký và thanh toán để kích hoạt tài khoản.' }
      };
      const info = statusMap[acct.accountStatus] || statusMap.payment_pending;
      const daysLeft = acct.pendingExpiresAt ? D68.daysLeft(acct.pendingExpiresAt) : null;
      gateVals = {
        gated:true, gateIcon: info.icon, gateTitle: info.title, gateDesc: info.desc,
        gateHasOrder: !!acct.orderCode, gateOrderCode: acct.orderCode ? ('DEALS68-'+acct.orderCode) : '',
        gateHasDays: daysLeft!=null, gateDaysLeft: daysLeft!=null ? (daysLeft + ' ngày còn lại') : '',
        gateBack: ()=>this.setState({ gated:false, gateAcct:null, error:'' })
      };
    }

    return {
      roleTabs, roleLabel, roleLabelLower: roleLabel.toLowerCase(),
      inputStyle, userFieldLabel, userFieldPlaceholder,
      username: st.username, onUsername: (e)=>this.setState({ username:e.target.value }),
      password: st.password, onPassword: (e)=>this.setState({ password:e.target.value }),
      hasError: !!st.error, errorMsg: st.error,
      submit: ()=>this.submit(),
      forgotHref: 'Deals68 Forgot Password.dc.html?role=' + st.role,
      registerHref: registerHrefMap[st.role],
      demoHint: demoHintMap[st.role],
      ...gateVals
    };
  }
}
</script>
</body>
</html>
