name: Apply investors wording and About main UI

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped UI update
        run: |
          python3 scripts/apply-investors-about-main-v1.py
          rm -f src/styles/pages/about.css

      - name: Verify source contracts
        shell: bash
        run: |
          grep -q "nhà đầu tư, đối tác" src/pages/Investors.tsx
          grep -q "investors and partners" src/pages/Investors.tsx
          ! grep -q "T(lang, 'hồ sơ', 'profiles')" src/pages/Investors.tsx
          grep -q 'title="Về Deals68"' src/pages/StaticPages.tsx
          grep -q 'Tầm nhìn toàn cầu của Deals68' src/pages/StaticPages.tsx
          grep -q 'Nền tảng được xây quanh niềm tin dữ liệu' src/pages/StaticPages.tsx
          grep -q 'Ba nhóm người dùng chính' src/pages/StaticPages.tsx
          ! grep -q 'd68-static-about-page' src/pages/StaticPages.tsx
          ! grep -q 'Cấu trúc chiến lược năm lớp' src/pages/StaticPages.tsx
          grep -q 'color:#F2B51D;' src/styles/pages/static.css
          ! grep -q "pages/about.css" src/styles/index.css
          test ! -f src/styles/pages/about.css

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Release QA
        run: npm run qa:release

      - name: Check diff formatting
        run: git diff --check

      - name: Commit verified source changes
        shell: bash
        run: |
          rm -f scripts/apply-investors-about-main-v1.py
          rm -f .github/workflows/apply-investors-about-main-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(ui): restore main About and investor list wording"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
