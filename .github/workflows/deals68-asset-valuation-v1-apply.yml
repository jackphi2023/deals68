name: Apply asset valuation v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-fix-series:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout building
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin building
          git checkout -q -B building FETCH_HEAD

      - name: Baseline fix-series QA
        run: npm run qa:fix-series
