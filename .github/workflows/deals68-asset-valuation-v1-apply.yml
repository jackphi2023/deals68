name: Apply asset valuation v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply source patch
        run: |
          python3 scripts/apply_asset_valuation_v1.py 2>&1 | tail -n 40
          exit ${PIPESTATUS[0]}
