name: Apply asset valuation v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deals68-asset-valuation-v1-final
  cancel-in-progress: false

jobs:
  apply-verify-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout building
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin building
          git checkout -q -B building FETCH_HEAD

      - name: Prepare and apply valuation-only source patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('scripts/apply_asset_valuation_v1.py')
          text = path.read_text(encoding='utf-8')
          pattern = r'''\nreplace_once\(\n    VALUATION,\n    "'Dùng bội số EV/EBITDA và EV/Doanh thu theo 23 nhóm ngành chuẩn hóa\.',\\n                 'Uses EV/EBITDA and EV/Revenue multiples across the standardized 23 industries\.',",\n    "'Dùng bội số EV/EBITDA, EV/Doanh thu và lớp tài sản có kiểm soát cho ngành tài sản nặng khi có dữ liệu\.',\\n                 'Uses EV/EBITDA, EV/Revenue and a controlled asset layer for asset-heavy industries when data is provided\.',",\n\)\n'''
          updated, count = re.subn(pattern, '\n', text, count=1)
          if count != 1:
              raise SystemExit('Could not relax optional valuation copy patch')
          path.write_text(updated, encoding='utf-8')
          PY
          python3 scripts/apply_asset_valuation_v1.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/pages/BusinessDashboard.tsx')
          text = path.read_text(encoding='utf-8')
          old = "{formatValuationMoney(result.netDebtInput, assetCurrency, lang)}"
          new = "{Number(result.netDebtInput) === 0 ? (assetCurrency === 'USD' ? 'US$0' : '0 VNĐ') : formatValuationMoney(result.netDebtInput, assetCurrency, lang)}"
          if old not in text:
              raise SystemExit('Expected net-debt display marker was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify changed-file scope
        run: |
          allowed='^(package.json|src/lib/valuationEngine.ts|src/pages/Valuation.tsx|src/pages/Register.tsx|src/pages/BusinessDashboard.tsx|src/styles/pages/valuation.css|src/styles/pages/auth.css|src/styles/pages/dashboard.css|scripts/deals68-asset-valuation-v1-check.mjs|scripts/apply_asset_valuation_v1.py|.github/workflows/deals68-asset-valuation-v1-apply.yml)$'
          unexpected=$(git status --short | awk '{print $2}' | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo 'Unexpected out-of-scope files:'
            echo "$unexpected"
            exit 1
          fi

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Asset valuation contract
        run: npm run qa:asset-valuation

      - name: Production build
        run: npm run build

      - name: Release static regression compared with existing baseline
        run: |
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/release-static.log 2>&1
          status=$?
          set -e
          tail -n 25 /tmp/release-static.log
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          failure_count=$(grep -c '✗' /tmp/release-static.log || true)
          grep -Fq '✗ business industry links and filters use canonical taxonomy keys' /tmp/release-static.log
          grep -Fq 'Release QA static check failed: 1/25' /tmp/release-static.log
          test "$failure_count" -eq 1
          echo 'Accepted only the single pre-existing taxonomy baseline failure; no valuation regression detected.'

      - name: CSS architecture QA
        run: npm run qa:css

      - name: Existing fix-series regression
        run: npm run qa:fix-series

      - name: Diff validation
        run: git diff --check

      - name: Commit valuation-only source to building
        run: |
          git config user.name "Deals68 Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(valuation): add asset-adjusted reference logic"
          git push origin HEAD:building
