name: Apply asset valuation v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-release-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout building
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin building
          git checkout -q -B building FETCH_HEAD

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Baseline release QA
        run: |
          set +e
          npm run qa:release > /tmp/release-qa.log 2>&1
          status=$?
          tail -n 20 /tmp/release-qa.log
          exit "$status"
