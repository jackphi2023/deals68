name: Temporary register business currency update

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify scoped EN business financial currency
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/Register.tsx')
          text = path.read_text()

          required = [
              "const financialInputCurrency: 'VND' | 'USD' = lang === 'en' ? 'USD' : 'VND';",
              "currency: financialInputCurrency,",
              "const revenueCurrency = financialInputCurrency;",
              "const currentCurrency = financialInputCurrency;",
              "`Latest annual revenue (${currentCurrency})`",
              "`Capital sought / desired transaction value (${currentCurrency})`",
          ]
          forbidden = [
              "Latest annual revenue (VND)",
              "Monthly revenue (VND)",
              "const currentCurrency = countryCode === 'VN' ? 'VND' : 'USD';",
          ]

          missing = [item for item in required if item not in text]
          stale = [item for item in forbidden if item in text]
          if missing or stale:
              raise SystemExit(f'Missing expected currency logic: {missing}; stale values: {stale}')
          PY
      - run: git diff --check
      - run: npm ci --silent
      - run: npm run build
