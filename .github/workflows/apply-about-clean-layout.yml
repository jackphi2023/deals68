name: Apply About clean layout

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply About source cleanup
        run: python3 scripts/apply-about-clean-layout.py

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Commit verified About update
        shell: bash
        run: |
          rm -f scripts/apply-about-clean-layout.py
          rm -f .github/workflows/apply-about-clean-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(about): clean equal-column layout and typography"
          git push origin HEAD:building
