name: Phase 5 Release Diagnostic

on:
  pull_request:
    branches: [building]
    paths: ['.github/workflows/phase5-release-diagnostic.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Print concise release static failures
        shell: bash
        run: |
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/release-static.log 2>&1
          status=$?
          grep -E '^(✗|Release QA static check failed:)' /tmp/release-static.log || true
          exit "$status"
