name: Apply and verify register wording and industry expansion

on:
  pull_request:
    branches:
      - building
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply scoped Register patch
        run: python3 scripts/apply-register-wording-industry-expanded.py

      - name: Verify source contracts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('src/pages/Register.tsx').read_text(encoding='utf-8')
          assert 'Tài sản hữu hình & vô hình doanh nghiệp sở hữu (Không bắt buộc điền)' not in source
          assert 'Mô tả giá trị của các tài sản hữu hình thuộc sở hữu của doanh nghiệp sẽ được đưa vào giao dịch (Không bắt buộc điền)' not in source
          assert "'Tài sản hữu hình & vô hình doanh nghiệp sở hữu'" in source
          assert "'Mô tả giá trị của các tài sản hữu hình thuộc sở hữu của doanh nghiệp sẽ được đưa vào giao dịch'" in source
          picker = source[source.index('<IndustryTagPicker', source.index("'Ngành quan tâm'")):]
          picker = picker[:picker.index('/>')]
          assert 'defaultExpanded' in picker
          assert "placeholder={T(lang, 'Không bắt buộc điền', 'Optional')}" in source
          print('Register wording and default industry expansion contracts: PASS')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Check diff formatting
        run: git diff --check

      - name: Commit verified source and remove one-time tooling
        run: |
          rm -f scripts/apply-register-wording-industry-expanded.py
          rm -f .github/workflows/apply-register-wording-industry-expanded.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(register): refine asset labels and expand industries"
          git push origin HEAD:${{ github.head_ref }}
