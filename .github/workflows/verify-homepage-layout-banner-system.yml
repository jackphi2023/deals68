name: Verify homepage layout and banners

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped homepage and banner cleanup
        shell: bash
        run: |
          if [ -f scripts/apply-homepage-layout-banner-system-v2.py ]; then
            python3 scripts/apply-homepage-layout-banner-system-v2.py
          fi

      - name: Verify source ownership contracts
        shell: bash
        run: |
          test "$(grep -o 'd68-home-block' src/pages/Home.tsx | wc -l | tr -d ' ')" = "7"
          ! grep -q ':has(.d68-home-investor-grid)' src/styles/pages/ui-fixes.css
          ! grep -q 'Promotion banner spacing:' src/styles/final/release-foundation.css
          ! grep -q '.d68-home-section{padding:' src/styles/pages/home.css
          ! grep -q 'd68-promo-banner.d68-home-container{padding-top' src/styles/pages/ui-fixes.css
          grep -q -- '--d68-home-section-gap: 80px' src/styles/pages/home-layout.css
          grep -q 'starts_at.is.null,starts_at.lte' src/lib/banners.ts
          grep -q 'async function setBannerActive' src/components/SiteBanners.tsx

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Commit verified source changes
        shell: bash
        run: |
          rm -f scripts/apply-homepage-layout-banner-system.py
          rm -f scripts/repair-homepage-layout-banner-patcher.py
          rm -f scripts/apply-homepage-layout-banner-system-v2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(home): unify section spacing and promotion visibility"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
