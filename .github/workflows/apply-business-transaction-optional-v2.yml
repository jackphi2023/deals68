name: Apply optional business transaction fields v2

on:
  push:
    branches:
      - building
    paths:
      - .github/workflows/apply-business-transaction-optional-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 0

      - name: Apply scoped source updates
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, content):
              Path(path).write_text(content, encoding='utf-8')

          def replace_once(content, old, new, label):
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, found {count}')
              return content.replace(old, new, 1)

          # Register Business: optional fields, new included-assets semantics, and layout.
          path = 'src/pages/Register.tsx'
          text = read(path)
          text = text.replace('excludedAssetValue', 'includedTangibleAssets')
          text = text.replace('excluded_physical_asset_value', 'included_tangible_assets')
          text = replace_once(
              text,
              "  const [financialSource, setFinancialSource] = useState(\n    'management_accounts',\n  );",
              "  const [financialSource, setFinancialSource] = useState('');",
              'Register financial source default',
          )
          text = replace_once(
              text,
              "<h2>{T(lang, 'Thông tin doanh nghiệp', 'Business information')}</h2>",
              "<h2>{T(lang, 'Thông tin doanh nghiệp & Giao dịch', 'Business & Transaction Information')}</h2>",
              'Register business section title',
          )

          reason_block = """                <Field
                  label={T(
                    lang,
                    'Lý do gọi vốn/chuyển nhượng',
                    'Reason for fundraising/sale',
                  )}
                  wide
                  spaced
                >
                  <input
                    value={reason}
                    onChange={(event) => setReason(event.target.value)}
                  />
                </Field>"""

          transaction_fields = """                <Field
                  label={T(
                    lang,
                    'Tài sản hữu hình & vô hình doanh nghiệp sở hữu (Không bắt buộc điền)',
                    'Tangible and intangible assets owned by the business (Optional)',
                  )}
                  hint={T(
                    lang,
                    'Ví dụ: thương hiệu, quyền sở hữu trí tuệ, hệ thống, máy móc, phương tiện, bất động sản hoặc tài sản khác.',
                    'Examples: brand, intellectual property, systems, machinery, vehicles, real estate or other assets.',
                  )}
                  wide
                  spaced
                >
                  <textarea
                    rows={3}
                    value={assetsOwned}
                    onChange={(event) => setAssetsOwned(event.target.value)}
                    placeholder={T(lang, 'Không bắt buộc điền', 'Optional')}
                  />
                </Field>
                <Field
                  label={T(
                    lang,
                    'Mô tả giá trị của các tài sản hữu hình thuộc sở hữu của doanh nghiệp sẽ được đưa vào giao dịch (Không bắt buộc điền)',
                    'Description and value of tangible assets owned by the business that will be included in the transaction (Optional)',
                  )}
                  hint={T(
                    lang,
                    'Ví dụ: khi bán khách sạn, giao dịch có thể bao gồm quyền sử dụng đất, công trình khách sạn, nội thất và thiết bị. Nêu giá trị ước tính và đơn vị tiền nếu có.',
                    'Example: a hotel sale may include land-use rights, the hotel building, furniture and equipment. Include estimated values and currency where available.',
                  )}
                  wide
                  spaced
                >
                  <textarea
                    rows={3}
                    value={includedTangibleAssets}
                    onChange={(event) => setIncludedTangibleAssets(event.target.value)}
                    placeholder={T(lang, 'Không bắt buộc điền', 'Optional')}
                  />
                </Field>
                <Field
                  label={T(
                    lang,
                    'Nguồn số liệu tài chính (Không bắt buộc điền)',
                    'Financial data source (Optional)',
                  )}
                  wide
                  spaced
                >
                  <select
                    value={financialSource}
                    onChange={(event) => setFinancialSource(event.target.value)}
                  >
                    <option value="">{T(lang, 'Chọn nguồn số liệu nếu có', 'Select a data source if available')}</option>
                    <option value="management_accounts">{T(lang, 'Số liệu quản trị nội bộ', 'Management accounts')}</option>
                    <option value="tax_report">{T(lang, 'Báo cáo thuế', 'Tax filings')}</option>
                    <option value="audited_financials">{T(lang, 'Báo cáo kiểm toán', 'Audited financials')}</option>
                    <option value="bank_statement">{T(lang, 'Sao kê ngân hàng / POS', 'Bank / POS statements')}</option>
                    <option value="estimate">{T(lang, 'Ước tính của chủ DN', 'Founder estimate')}</option>
                  </select>
                </Field>
""" + reason_block
          text = replace_once(text, reason_block, transaction_fields, 'Register transaction fields insertion')

          section_start = """              <section className="d68-register-section">
                <h2>{T(lang, 'Thông tin tài sản & nguồn số liệu', 'Assets & financial source')}</h2>"""
          marker = "                    <b>{valuationCheck.label}</b>"
          start = text.find(section_start)
          marker_index = text.find(marker, start)
          if start < 0 or marker_index < 0:
              raise SystemExit('Register valuation section markers not found')
          valuation_prefix = """              <section className="d68-register-section">
                <h2>{T(lang, 'Gợi ý kiểm tra định giá', 'Valuation sanity check')}</h2>
                <div className={`d68-valuation-check d68-valuation-check--${valuationCheck.level}`}>
                  <div>
"""
          text = text[:start] + valuation_prefix + text[marker_index:]
          write(path, text)

          # Business Dashboard: show/edit optional transaction fields and submit them for Admin review.
          path = 'src/pages/BusinessDashboard.tsx'
          text = read(path)
          text = replace_once(
              text,
              "      ok: !!(financialInput.assets_owned || financialInput.financial_data_source || financialInput.excluded_physical_asset_value),\n      label: T(lang, 'Tài sản & nguồn số liệu', 'Assets & data source'),\n      detail: T(lang, 'Tài sản hữu hình/vô hình, tài sản loại trừ, nguồn số liệu', 'Tangible/intangible assets, excluded assets and data source')",
              "      ok: !!(financialInput.assets_owned_vi || financialInput.assets_owned_en || financialInput.assets_owned || financialInput.included_tangible_assets_vi || financialInput.included_tangible_assets_en || financialInput.included_tangible_assets || financialInput.financial_source),\n      label: T(lang, 'Tài sản & nguồn số liệu', 'Assets & data source'),\n      detail: T(lang, 'Tài sản doanh nghiệp sở hữu, tài sản hữu hình đưa vào giao dịch và nguồn số liệu', 'Business-owned assets, tangible assets included in the transaction and data source')",
              'Dashboard quality item',
          )

          save_marker = "    const city = locationDbLabel(cityKey || submittedCity, countryIso2);\n    const pending = {"
          save_insert = """    const city = locationDbLabel(cityKey || submittedCity, countryIso2);
    const currentFinancialInput = financialInputOf(ownerView);
    const assetsOwned = fieldValue(fd, 'assets_owned_localized');
    const includedTangibleAssets = fieldValue(fd, 'included_tangible_assets_localized');
    const financialSource = fieldValue(fd, 'financial_source');
    const localizedFinancialInput = lang === 'en'
      ? {
          assets_owned: assetsOwned,
          assets_owned_en: assetsOwned,
          included_tangible_assets: includedTangibleAssets,
          included_tangible_assets_en: includedTangibleAssets,
        }
      : {
          assets_owned: assetsOwned,
          assets_owned_vi: assetsOwned,
          included_tangible_assets: includedTangibleAssets,
          included_tangible_assets_vi: includedTangibleAssets,
        };
    const pending = {"""
          text = replace_once(text, save_marker, save_insert, 'Dashboard save transaction input')
          text = replace_once(
              text,
              "      financial_input: financialInputOf(ownerView)",
              "      financial_input: {\n        ...currentFinancialInput,\n        ...localizedFinancialInput,\n        financial_source: financialSource,\n      }",
              'Dashboard financial input payload',
          )

          profile_state_marker = """  const [askCurrency, setAskCurrency] = useState(
    String(b.ask_currency || b.revenue_currency || 'VND').toUpperCase(),
  );

  return <form"""
          profile_state_insert = """  const [askCurrency, setAskCurrency] = useState(
    String(b.ask_currency || b.revenue_currency || 'VND').toUpperCase(),
  );
  const financialInput = financialInputOf(b);
  const assetsOwnedValue = lang === 'en'
    ? financialInput.assets_owned_en || financialInput.assets_owned || ''
    : financialInput.assets_owned_vi || financialInput.assets_owned || '';
  const includedTangibleAssetsValue = lang === 'en'
    ? financialInput.included_tangible_assets_en || financialInput.included_tangible_assets || ''
    : financialInput.included_tangible_assets_vi || financialInput.included_tangible_assets || '';

  return <form"""
          text = replace_once(text, profile_state_marker, profile_state_insert, 'Dashboard profile defaults')

          highlights_line = "    <label className=\"d68-dashboard-field\"><span>{T(lang,'Điểm nổi bật','Highlights')}</span><textarea className=\"d68-dashboard-input d68-dashboard-textarea\" name=\"highlights_vi\" defaultValue={b.highlights_vi || ''}/></label>"
          dashboard_fields = highlights_line + """
    <div className="d68-business-transaction-fields">
      <h3>{T(lang,'Thông tin Tài sản & Giao dịch','Assets & Transaction Information')}</h3>
      <label className="d68-dashboard-field"><span>{T(lang,'Tài sản hữu hình & vô hình doanh nghiệp sở hữu (Không bắt buộc điền)','Tangible and intangible assets owned by the business (Optional)')}</span><textarea className="d68-dashboard-input d68-dashboard-textarea" name="assets_owned_localized" defaultValue={assetsOwnedValue} placeholder={T(lang,'Không bắt buộc điền','Optional')}/><small>{T(lang,'Ví dụ: thương hiệu, quyền sở hữu trí tuệ, hệ thống, máy móc, phương tiện, bất động sản hoặc tài sản khác.','Examples: brand, intellectual property, systems, machinery, vehicles, real estate or other assets.')}</small></label>
      <label className="d68-dashboard-field"><span>{T(lang,'Mô tả giá trị của các tài sản hữu hình thuộc sở hữu của doanh nghiệp sẽ được đưa vào giao dịch (Không bắt buộc điền)','Description and value of tangible assets owned by the business that will be included in the transaction (Optional)')}</span><textarea className="d68-dashboard-input d68-dashboard-textarea" name="included_tangible_assets_localized" defaultValue={includedTangibleAssetsValue} placeholder={T(lang,'Không bắt buộc điền','Optional')}/><small>{T(lang,'Ví dụ: khi bán khách sạn, giao dịch có thể bao gồm quyền sử dụng đất, công trình khách sạn, nội thất và thiết bị. Nêu giá trị ước tính và đơn vị tiền nếu có.','Example: a hotel sale may include land-use rights, the hotel building, furniture and equipment. Include estimated values and currency where available.')}</small></label>
      <label className="d68-dashboard-field"><span>{T(lang,'Nguồn số liệu tài chính (Không bắt buộc điền)','Financial data source (Optional)')}</span><select className="d68-dashboard-input" name="financial_source" defaultValue={financialInput.financial_source || ''}><option value="">{T(lang,'Chọn nguồn số liệu nếu có','Select a data source if available')}</option><option value="management_accounts">{T(lang,'Số liệu quản trị nội bộ','Management accounts')}</option><option value="tax_report">{T(lang,'Báo cáo thuế','Tax filings')}</option><option value="audited_financials">{T(lang,'Báo cáo kiểm toán','Audited financials')}</option><option value="bank_statement">{T(lang,'Sao kê ngân hàng / POS','Bank / POS statements')}</option><option value="estimate">{T(lang,'Ước tính của chủ DN','Founder estimate')}</option></select></label>
    </div>"""
          text = replace_once(text, highlights_line, dashboard_fields, 'Dashboard optional fields UI')
          write(path, text)

          # Admin: review/edit the new VN/EN fields, keep source internal, and remove yellow editor background.
          path = 'src/pages/Admin.tsx'
          text = read(path)
          text = text.replace('excluded_physical_asset_value', 'included_tangible_assets')
          text = text.replace('Tài sản vật chất không nằm trong giao dịch (VN)', 'Tài sản hữu hình đưa vào giao dịch (VN)')
          text = text.replace('Physical assets excluded from the transaction (EN)', 'Tangible assets included in the transaction (EN)')
          text = replace_once(
              text,
              "  ['included_tangible_assets_en', 'Tangible assets included in the transaction (EN)'],\n] as const;",
              "  ['included_tangible_assets_en', 'Tangible assets included in the transaction (EN)'],\n  ['financial_source', 'Nguồn số liệu tài chính (nội bộ)'],\n] as const;",
              'Admin review source key',
          )
          text = replace_once(
              text,
              "        included_tangible_assets_en: text(form.get('included_tangible_assets_en')),\n      },",
              "        included_tangible_assets_en: text(form.get('included_tangible_assets_en')),\n        financial_source: text(form.get('financial_source')),\n      },",
              'Admin approval financial source',
          )
          text = text.replace('Tài sản vật chất KHÔNG nằm trong giao dịch (VN)', 'Tài sản hữu hình thuộc sở hữu doanh nghiệp sẽ được đưa vào giao dịch (VN)')
          text = text.replace('Physical assets excluded from the transaction (EN)', 'Tangible assets owned by the business that will be included in the transaction (EN)')
          text = text.replace('placeholder="Mô tả tài sản bị loại trừ khỏi giao dịch"', 'placeholder="Ví dụ: quyền sử dụng đất, công trình khách sạn, nội thất và thiết bị nằm trong phạm vi giao dịch"')
          text = text.replace('placeholder="Describe physical assets excluded from the transaction"', 'placeholder="Example: land-use rights, hotel building, furniture and equipment included in the transaction"')
          admin_tail = 'placeholder="Example: land-use rights, hotel building, furniture and equipment included in the transaction" className="d68-admin-input textarea"/></label></div><p className="d68-admin-subtle">Các key khác trong financial_input được giữ nguyên khi Admin duyệt.</p>'
          admin_tail_new = 'placeholder="Example: land-use rights, hotel building, furniture and equipment included in the transaction" className="d68-admin-input textarea"/></label><label className="d68-admin-field"><span>Nguồn số liệu tài chính (nội bộ, không public)</span><select name="financial_source" defaultValue={reviewFinancialValue(\'financial_source\')} className="d68-admin-input"><option value="">Chưa cung cấp</option><option value="management_accounts">Số liệu quản trị nội bộ</option><option value="tax_report">Báo cáo thuế</option><option value="audited_financials">Báo cáo kiểm toán</option><option value="bank_statement">Sao kê ngân hàng / POS</option><option value="estimate">Ước tính của chủ DN</option></select></label></div><p className="d68-admin-subtle">Các key khác trong financial_input được giữ nguyên khi Admin duyệt. Nguồn số liệu tài chính chỉ dùng nội bộ và không đưa vào public snapshot.</p>'
          text = replace_once(text, admin_tail, admin_tail_new, 'Admin source selector UI')
          write(path, text)

          path = 'src/styles/pages/admin.css'
          text = read(path)
          text = replace_once(
              text,
              '.d68-admin-financial-review-box{border:1px solid #F2D27A;background:#FFFBEB;border-radius:12px;padding:14px;margin:4px 0}',
              '.d68-admin-financial-review-box{border:1px solid #E2E8F0;background:#F8FAFC;border-radius:12px;padding:14px;margin:4px 0}',
              'Admin neutral transaction editor',
          )
          write(path, text)

          # Public Business Detail: approved-only fields; omit blank rows and the whole section when empty.
          path = 'src/pages/BusinessDetail.tsx'
          text = read(path)
          text = text.replace('excluded_physical_asset_value', 'included_tangible_assets')
          text = replace_once(
              text,
              "  return value || T(lang, 'Đang cập nhật', 'Pending');",
              "  return value;",
              'Business detail optional localized value',
          )
          text = text.replace("T(lang, 'Giá trị tài sản vật chất KHÔNG nằm trong giao dịch', 'Physical asset value NOT included in the transaction')", "T(lang, 'Tài sản hữu hình thuộc sở hữu doanh nghiệp sẽ được đưa vào giao dịch', 'Tangible assets owned by the business that will be included in the transaction')")
          text = replace_once(
              text,
              "    ];\n  }, [business, lang]);",
              "    ].filter((item) => cleanText(item.value));\n  }, [business, lang]);",
              'Business detail filter empty rows',
          )
          old_section = "          <InfoSection title={T(lang, 'Thông tin Tài sản & Giao dịch', 'Assets & Transaction Information')}><div className=\"d68-detail-transaction-info\">{transactionInfo.map((item) => <div key={item.label} className=\"d68-detail-transaction-row\"><span>{item.label}</span><p>{item.value}</p></div>)}</div></InfoSection>"
          new_section = "          {transactionInfo.length ? <InfoSection title={T(lang, 'Thông tin Tài sản & Giao dịch', 'Assets & Transaction Information')}><div className=\"d68-detail-transaction-info\">{transactionInfo.map((item) => <div key={item.label} className=\"d68-detail-transaction-row\"><span>{item.label}</span><p>{item.value}</p></div>)}</div></InfoSection> : null}"
          text = replace_once(text, old_section, new_section, 'Business detail conditional section')
          write(path, text)

          # Roll-forward migration: new semantic keys only. Legacy excluded_* data stays internal and is never reinterpreted.
          source_migration = Path('supabase/migrations/20260717215300_business_public_financial_snapshot_v1.sql')
          target_migration = Path('supabase/migrations/20260718090000_business_included_tangible_assets_v2.sql')
          migration = source_migration.read_text(encoding='utf-8')
          migration = migration.replace(
              '-- Deals68 Session 8 — publish approved Business asset/transaction fields safely.\n-- Keeps raw financial_input private and exposes only Admin-approved public fields.',
              '-- Deals68 — publish optional included tangible asset fields safely.\n-- Legacy excluded_physical_asset_value* keys remain internal and are never reinterpreted.\n-- Keeps raw financial_input private and exposes only Admin-approved public fields.',
          )
          migration = migration.replace('excluded_physical_asset_value', 'included_tangible_assets')
          migration = migration.replace(
              '-- Backfill only previously approved public snapshots, using the protected approved\n-- financial_input column and exposing only the two public asset groups.',
              '-- Refresh only previously approved public snapshots from the new semantic keys.\n-- Blank included-asset values remain absent; legacy excluded_* values are not copied.',
          )
          target_migration.write_text(migration, encoding='utf-8')

          # Static contract assertions before TypeScript build.
          register = read('src/pages/Register.tsx')
          dashboard = read('src/pages/BusinessDashboard.tsx')
          admin = read('src/pages/Admin.tsx')
          detail = read('src/pages/BusinessDetail.tsx')
          migration = read(target_migration)
          assertions = [
              ('register new key', 'included_tangible_assets_vi' in register and 'included_tangible_assets_en' in register),
              ('register no legacy key', 'excluded_physical_asset_value' not in register),
              ('register optional labels', 'Không bắt buộc điền' in register and '(Optional)' in register),
              ('dashboard inputs', 'included_tangible_assets_localized' in dashboard and 'assets_owned_localized' in dashboard),
              ('admin review fields', 'included_tangible_assets_vi' in admin and 'financial_source' in admin),
              ('detail conditional section', 'transactionInfo.length ? <InfoSection' in detail),
              ('detail no legacy key', 'excluded_physical_asset_value' not in detail),
              ('migration new key', 'included_tangible_assets_vi' in migration and 'included_tangible_assets_en' in migration),
              ('migration no legacy key', 'excluded_physical_asset_value' in migration.splitlines()[1] and "->>'excluded_physical_asset_value" not in migration),
          ]
          failed = [name for name, ok in assertions if not ok]
          if failed:
              raise SystemExit('Contract assertions failed: ' + ', '.join(failed))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit scoped update to building
        shell: bash
        run: |
          rm -f .github/workflows/apply-business-transaction-optional-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(business): add optional included-asset transaction fields"
          git push origin HEAD:building
