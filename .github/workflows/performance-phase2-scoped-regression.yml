name: Scoped regression performance phase 2

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: read

jobs:
  scoped-regression:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build
        run: npm run build
      - name: Run all package checks except known pre-existing G5 contract
        shell: bash
        run: |
          node <<'NODE'
          const { spawnSync } = require('child_process');
          const fs = require('fs');
          const text = fs.readFileSync('scripts/deals68-package-checks.mjs', 'utf8');
          const scripts = [...text.matchAll(/'([^']+\.mjs)'/g)].map((m) => m[1]);
          const skipped = 'scripts/deals68-home-investors-hero-ux-check.mjs';
          for (const script of scripts) {
            if (script === skipped) continue;
            console.log(`\n▶ ${script}`);
            const result = spawnSync(process.execPath, [script], { stdio: 'inherit' });
            if (result.status !== 0) process.exit(result.status || 1);
          }
          console.log(`\nPASS: ${scripts.length - 1}/${scripts.length} package checks; one known pre-existing G5 check skipped.`);
          NODE
      - name: Confirm known G5 failure is identical to baseline
        shell: bash
        run: |
          set +e
          node scripts/deals68-home-investors-hero-ux-check.mjs > /tmp/current-g5.log 2>&1
          current_status=$?
          set -e
          git worktree add /tmp/phase2-baseline e071cd635d36099c35d90788afbf8298e1558d3a
          cd /tmp/phase2-baseline
          set +e
          node scripts/deals68-home-investors-hero-ux-check.mjs > /tmp/baseline-g5.log 2>&1
          baseline_status=$?
          set -e
          test "$current_status" = "$baseline_status"
          diff -u /tmp/baseline-g5.log /tmp/current-g5.log
          echo 'Known G5 failure is identical before and after Phase 2.'
      - name: Confirm release static failure is identical to baseline
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/current-release.log 2>&1
          current_status=$?
          set -e
          cd /tmp/phase2-baseline
          npm ci >/dev/null
          npm run build >/dev/null
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/baseline-release.log 2>&1
          baseline_status=$?
          set -e
          test "$current_status" = "$baseline_status"
          grep '^✗ ' /tmp/current-release.log > /tmp/current-release-failures.txt || true
          grep '^✗ ' /tmp/baseline-release.log > /tmp/baseline-release-failures.txt || true
          diff -u /tmp/baseline-release-failures.txt /tmp/current-release-failures.txt
          echo 'Release static failure set is identical before and after Phase 2.'
      - name: Core QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
