name: Temporary Business document controls main trigger

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: python scripts/temp-update-business-documents.py
      - name: Verify document controls contract
        run: |
          python - <<'PY'
          from pathlib import Path
          dashboard = Path('src/pages/BusinessDashboard.tsx').read_text()
          data = Path('src/lib/data.ts').read_text()
          pending = Path('src/lib/pendingBusinessUploads.ts').read_text()
          required = [
              "{ value: 'corporate', vi: 'Pháp nhân, Tổ chức', en: 'Corporate' }",
              "{ value: 'legal', vi: 'Pháp lý', en: 'Legal' }",
              "{ value: 'business', vi: 'Kinh doanh và Vận hành', en: 'Business' }",
              "{ value: 'financial', vi: 'Tài chính và Thuế', en: 'Financial' }",
              "T(lang,'Tải tài liệu','Download')",
              'downloadBusinessFile(row)',
              "category: documentCategory(category) || null",
              "category: string | null = null",
              ".download(path)",
              "          null,\n          'locked',",
          ]
          missing = [item for item in required if item not in dashboard + data + pending]
          forbidden = [
              'Tên file hiển thị',
              "useState('financials')",
              '<option value="financials">Financials</option>',
              '<option value="profile">Profile</option>',
          ]
          stale = [item for item in forbidden if item in dashboard]
          if missing or stale:
              raise SystemExit(f'Missing: {missing}; stale: {stale}')
          PY
      - name: Normalize generated whitespace
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in [
              'src/pages/BusinessDashboard.tsx',
              'src/lib/data.ts',
              'src/lib/pendingBusinessUploads.ts',
              'src/styles/pages/business-dashboard.css',
          ]:
              path = Path(name)
              lines = [line.rstrip() for line in path.read_text().splitlines()]
              while lines and not lines[-1]:
                  lines.pop()
              path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Capture diff check
        run: git diff --check > business-document-diff-check.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: business-document-diff-check
          path: business-document-diff-check.txt
      - name: Enforce diff check
        run: test ! -s business-document-diff-check.txt
      - run: npm ci --silent
      - run: npm run build
      - run: npm run qa:css
      - run: npm run qa:migrations
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/BusinessDashboard.tsx src/lib/data.ts src/lib/pendingBusinessUploads.ts src/styles/pages/business-dashboard.css
          git commit -m "feat(business): organize and download dashboard documents"
          git push origin HEAD:building
