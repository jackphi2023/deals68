name: Trigger optional business transaction update v2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped patch
        run: python3 scripts/run-one-time-business-transaction-v2.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit update to building and remove one-time files
        shell: bash
        run: |
          rm -f .github/workflows/apply-business-transaction-optional-v2.yml
          rm -f .github/workflows/trigger-business-transaction-optional-v2.yml
          rm -f scripts/run-one-time-business-transaction-v2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(business): add optional included-asset transaction fields"
          git push origin HEAD:building
