name: Trigger optional business transaction update v2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped patch
        id: patch
        continue-on-error: true
        shell: bash
        run: python3 scripts/run-one-time-business-transaction-v2.py > /tmp/business-transaction-patch.log 2>&1

      - name: Upload patch diagnostic
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: business-transaction-patch-diagnostic
          path: /tmp/business-transaction-patch.log
          retention-days: 1

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/business-transaction-patch.log
          exit 1

      - name: Install dependencies
        if: steps.patch.outcome == 'success'
        run: npm ci

      - name: Build
        id: build
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: npm run build > /tmp/business-transaction-build.log 2>&1

      - name: Upload build diagnostic
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: business-transaction-build-diagnostic
          path: /tmp/business-transaction-build.log
          retention-days: 1

      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/business-transaction-build.log
          exit 1

      - name: Commit update to building and remove one-time files
        if: steps.patch.outcome == 'success' && steps.build.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/workflows/apply-business-transaction-optional-v2.yml
          rm -f .github/workflows/trigger-business-transaction-optional-v2.yml
          rm -f scripts/run-one-time-business-transaction-v2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(business): add optional included-asset transaction fields"
          git push origin HEAD:building
