name: Investor Profile V10 QA

on:
  push:
    branches:
      - feature/investor-profile-v10
      - beta-reference
  pull_request:
    branches:
      - beta-reference
    paths:
      - 'public/assets/investor-cover-default.svg'
      - 'src/App.tsx'
      - 'src/components/admin/**'
      - 'src/components/investor/**'
      - 'src/lib/investorAdminV10.ts'
      - 'src/lib/investorProfileService.ts'
      - 'src/pages/AdminBannersV10.tsx'
      - 'src/pages/AdminInvestorsV10.tsx'
      - 'src/pages/InvestorDetailV10.tsx'
      - 'src/pages/InvestorProfileV10.tsx'
      - 'src/styles/index.css'
      - 'src/styles/pages/investor-profile-v10.css'
      - 'scripts/deals68-investor-profile-v10-check.mjs'
      - 'scripts/deals68-investor-v10-beta-smoke.mjs'
      - 'scripts/deals68-package-checks.mjs'
      - 'scripts/deals68-migration-state-check.mjs'
      - 'supabase/migrations/20260715045336_investor_profile_cover_appetite_v1.sql'
      - 'supabase/migrations/20260715071812_investor_profile_cover_appetite_v2.sql'
      - 'supabase/migrations/20260715085429_investor_profile_cover_appetite_v3_privilege_hardening.sql'
      - '.github/workflows/investor-profile-v10-qa.yml'

permissions:
  contents: read
  statuses: write

jobs:
  build-and-package-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript and Vite production build
        env:
          VITE_SUPABASE_URL: https://local-test.supabase.co
          VITE_SUPABASE_ANON_KEY: local-test-anon-key
        run: npm run build

      - name: Investor Profile V10 semantic QA
        run: node scripts/deals68-investor-profile-v10-check.mjs

      - name: Full package QA
        run: npm run qa:packages

      - name: CSS architecture QA
        run: npm run qa:css

      - name: Migration state QA
        run: npm run qa:migrations

  beta-public-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/beta-reference'
    needs: build-and-package-qa
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Publish pending Beta smoke status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context='deals68/investor-v10-beta-smoke' \
            -f description='Waiting for Netlify Beta and real public smoke' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Checkout deployed Beta commit
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium and Linux dependencies
        run: npx playwright install --with-deps chromium

      - name: Poll Netlify Beta and run real public Investor smoke
        env:
          D68_BETA_URL: https://beta-reference-deals68.netlify.app
          D68_RELEASE_SHA: ${{ github.sha }}
        run: node scripts/deals68-investor-v10-beta-smoke.mjs

      - name: Publish successful Beta smoke status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='deals68/investor-v10-beta-smoke' \
            -f description='Real Netlify Beta Investor V10 smoke passed' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Publish failed Beta smoke status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='deals68/investor-v10-beta-smoke' \
            -f description='Real Netlify Beta Investor V10 smoke failed' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Upload Beta smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: investor-v10-beta-smoke-${{ github.sha }}
          path: |
            /tmp/deals68-investor-v10-beta-desktop.png
            /tmp/deals68-investor-v10-beta-mobile.png
          if-no-files-found: ignore
          retention-days: 7
