name: Apply and verify performance phase 5 payload trimming

on:
  push:
    branches:
      - automation/performance-phase5-payload-20260721

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.head_commit.message == 'ci: apply and verify performance phase 5 payload trimming'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase5-payload-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped payload projection changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/lib/data.ts')
          text = path.read_text()

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 occurrence, found {count}')
              text = text.replace(old, new, 1)

          marker = """const businessPublicSelect = [
  'id','public_code','slug','title_vi','title_en','description_vi','description_en','country_iso2','city','city_key','industry','industry_key','deal_type','plan','revenue_2025','revenue_currency','ebitda_margin','ask_amount','ask_currency','stake_pct','highlights_vi','highlights_en','investment_reason_vi','investment_reason_en','data_confidence','quality_score','valuation_reasonableness','visible','status','image_url','created_at','updated_at','public_snapshot_json','public_version','last_approved_at','moderation_status','hero_image_url','business_files_count','business_images_count','business_files','business_images'
].join(',');
"""
          replacement = marker + """

const businessCollectionSelect = [
  'id','public_code','slug','title_vi','title_en','description_vi','description_en','country_iso2','city','city_key','industry','industry_key','deal_type','plan','revenue_2025','revenue_currency','ebitda_margin','ask_amount','ask_currency','stake_pct','highlights_vi','highlights_en','investment_reason_vi','investment_reason_en','data_confidence','quality_score','valuation_reasonableness','visible','status','image_url','created_at','updated_at','public_version','last_approved_at','moderation_status','hero_image_url','business_files_count','business_images_count'
].join(',');

const businessHomepageSelect = [
  'id','public_code','slug','title_vi','title_en','country_iso2','city','city_key','industry','plan','revenue_2025','revenue_currency','ask_amount','ask_currency','stake_pct','visible','status','image_url','hero_image_url'
].join(',');
"""
          replace_once(marker, replacement, 'business projection constants')

          replace_once(
              "const select = filters.includeHidden ? '*, business_files(count), business_images(count)' : businessPublicSelect;",
              "const select = filters.includeHidden ? '*, business_files(count), business_images(count)' : businessCollectionSelect;",
              'listBusinesses projection',
          )
          replace_once(
              """  const select = filters.includeHidden
    ? '*, business_files(count), business_images(count)'
    : businessPublicSelect;""",
              """  const select = filters.includeHidden
    ? '*, business_files(count), business_images(count)'
    : businessCollectionSelect;""",
              'listBusinessesPage projection',
          )
          replace_once(
              ".select(businessPublicSelect as string)\n    .in('id', ids);",
              ".select(businessHomepageSelect as string)\n    .in('id', ids);",
              'homepage projection',
          )

          path.write_text(text)
          PY

          cat > scripts/deals68-performance-phase5-check.mjs <<'EOF'
          #!/usr/bin/env node
          import fs from 'node:fs';

          const source = fs.readFileSync('src/lib/data.ts', 'utf8');
          const failures = [];
          const check = (condition, message) => {
            if (!condition) failures.push(message);
          };

          const collectionMatch = source.match(/const businessCollectionSelect = \[([\s\S]*?)\]\.join\(','\);/);
          const homepageMatch = source.match(/const businessHomepageSelect = \[([\s\S]*?)\]\.join\(','\);/);
          const detailMatch = source.match(/const businessPublicSelect = \[([\s\S]*?)\]\.join\(','\);/);
          const collection = collectionMatch?.[1] || '';
          const homepage = homepageMatch?.[1] || '';
          const detail = detailMatch?.[1] || '';

          check(!!collectionMatch, 'Business collection projection is missing');
          check(!!homepageMatch, 'Business homepage projection is missing');
          check(detail.includes('public_snapshot_json'), 'Business detail projection must retain approved snapshot data');
          check(detail.includes('business_files') && detail.includes('business_images'), 'Business detail projection must retain existing detail metadata');
          check(!collection.includes('public_snapshot_json'), 'Business list must not transfer full public snapshot JSON');
          check(!collection.includes("'business_files'"), 'Business list must not transfer nested file metadata');
          check(!collection.includes("'business_images'"), 'Business list must not transfer nested image metadata');
          check(collection.includes('description_vi') && collection.includes('description_en'), 'Business list descriptions must remain available');
          check(collection.includes('ebitda_margin') && collection.includes('quality_score'), 'Business list metrics must remain available');
          check(homepage.includes('title_vi') && homepage.includes('title_en'), 'Homepage bilingual titles must remain available');
          check(homepage.includes('revenue_2025') && homepage.includes('ask_amount') && homepage.includes('stake_pct'), 'Homepage business metrics must remain available');
          check(homepage.includes('image_url') && homepage.includes('hero_image_url'), 'Homepage business images must remain available');
          check(/listBusinesses\([\s\S]*?businessCollectionSelect/.test(source), 'listBusinesses must use collection projection');
          check(/listBusinessesPage\([\s\S]*?businessCollectionSelect/.test(source), 'listBusinessesPage must use collection projection');
          check(/listHomepageBusinesses\([\s\S]*?businessHomepageSelect/.test(source), 'Homepage ranking query must use homepage projection');
          check(/getBusinessBySlug\([\s\S]*?businessPublicSelect/.test(source), 'Business detail query must keep full projection');

          if (failures.length) {
            failures.forEach((failure) => console.error(`✗ ${failure}`));
            process.exit(1);
          }

          console.log('✓ Performance Phase 5 payload contract: 16/16 PASS');
          EOF
          chmod +x scripts/deals68-performance-phase5-check.mjs

          cat > /tmp/performance-phase5-metrics.json <<'EOF'
          {
            "productionSample": {
              "activeBusinessRows": 8,
              "currentFullViewBytes": 41973,
              "collectionProjectionBytes": 18380,
              "homepageProjectionBytes": 6699
            },
            "estimatedReduction": {
              "businessCollectionPayloadPct": 56.21,
              "businessHomepagePayloadPct": 84.04
            },
            "scope": "Business public collection and homepage projections only. Business detail keeps the full approved snapshot. No CSS, JSX, wording, routes, schema, RLS or business workflow changes."
          }
          EOF
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Performance Phase 5 contract QA
        run: node scripts/deals68-performance-phase5-check.mjs
      - name: Core regression QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
          git diff --check
      - name: Verify UI and CSS scope
        shell: bash
        run: |
          changed="$(git diff --name-only HEAD)"
          echo "$changed"
          if echo "$changed" | grep -E '\.(css|scss|sass|less)$'; then
            echo 'CSS file changed unexpectedly'
            exit 1
          fi
          if echo "$changed" | grep -E '^src/(pages|components)/'; then
            echo 'Page or component file changed unexpectedly'
            exit 1
          fi
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .github/workflows/performance-phase5-payload.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/data.ts scripts/deals68-performance-phase5-check.mjs .github/workflows/performance-phase5-payload.yml
          git commit -m "perf(data): trim business collection payloads"
          git push origin HEAD:automation/performance-phase5-payload-20260721
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase5-metrics
          path: /tmp/performance-phase5-metrics.json
          if-no-files-found: warn
          retention-days: 7
