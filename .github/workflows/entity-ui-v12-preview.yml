name: Entity UI V12 Deploy Preview

on:
  pull_request:
    branches:
      - beta-reference
    paths:
      - '.github/workflows/entity-ui-v12-preview.yml'
      - 'src/styles/pages/entity-ui-v12.css'
      - 'scripts/deals68-entity-ui-v12-beta-smoke.mjs'
      - 'scripts/entity-ui-v12-home-hover-diagnostic.mjs'

permissions:
  contents: read

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Diagnose homepage Investor hover cascade
        env:
          D68_BETA_URL: https://deploy-preview-${{ github.event.pull_request.number }}--beta-reference-deals68.netlify.app
        run: node scripts/entity-ui-v12-home-hover-diagnostic.mjs | tee /tmp/deals68-home-hover-diagnostic.json

      - name: Wait for exact Netlify Deploy Preview and run V12 smoke
        env:
          D68_BETA_URLS: https://deploy-preview-${{ github.event.pull_request.number }}--beta-reference-deals68.netlify.app
          D68_DEPLOY_TIMEOUT_MS: 1200000
        run: |
          set -o pipefail
          node scripts/deals68-entity-ui-v12-beta-smoke.mjs 2>&1 | tee /tmp/deals68-entity-ui-v12-preview.log

      - name: Upload V12 preview diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entity-ui-v12-preview-${{ github.sha }}
          path: |
            /tmp/deals68-home-hover-diagnostic.json
            /tmp/deals68-entity-ui-v12-preview.log
            /tmp/deals68-entity-ui-v12-home.png
            /tmp/deals68-entity-ui-v12-listings.png
            /tmp/deals68-entity-ui-v12-detail-desktop.png
            /tmp/deals68-entity-ui-v12-detail-mobile.png
          if-no-files-found: ignore
          retention-days: 7
