name: Investor Plan Entitlements Phase 1

on:
  push:
    branches:
      - feature/investor-plan-entitlements-phase1-20260723
  pull_request:
    branches:
      - building
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  migration-diagnostic:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply scoped Phase 1 source
        run: node scripts/apply-investor-plan-entitlements-phase1.mjs

      - name: Investor plan contract QA
        run: node scripts/deals68-investor-plan-entitlements-check.mjs

      - name: Migration state QA
        run: node scripts/deals68-migration-state-check.mjs
