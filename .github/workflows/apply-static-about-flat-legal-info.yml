name: Apply About flat layout and legal info

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped static-page update
        shell: bash
        run: |
          if [ -f scripts/apply-static-about-flat-legal-info.py ]; then
            python3 scripts/apply-static-about-flat-legal-info.py
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit verified source update
        shell: bash
        run: |
          rm -f scripts/apply-static-about-flat-legal-info.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "feat(static): flatten About and finalize legal information"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
