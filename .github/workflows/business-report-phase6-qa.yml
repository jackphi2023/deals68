name: Business Report Phase 6 QA

on:
  push:
    branches: [main, building, automation/business-report-phase6-20260721]
    paths:
      - 'src/features/businessReports/**'
      - 'src/pages/BusinessDashboardWithReports.tsx'
      - 'scripts/deals68-business-report-phase6-check.mjs'
      - 'docs/release/AI_REPORT_PHASES_1_6.md'
      - 'package.json'
      - '.github/workflows/business-report-phase6-qa.yml'
  pull_request:
    branches: [main, building]
    paths:
      - 'src/features/businessReports/**'
      - 'src/pages/BusinessDashboardWithReports.tsx'
      - 'scripts/deals68-business-report-phase6-check.mjs'
      - 'docs/release/AI_REPORT_PHASES_1_6.md'
      - 'package.json'
      - '.github/workflows/business-report-phase6-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: business-report-phase6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production frontend build
        run: npm run build
      - name: Capture Phase 6 shared viewer contract
        id: phase6
        shell: bash
        run: |
          set +e
          npm run qa:business-report-phase6 > /tmp/phase6-contract.log 2>&1
          status=$?
          cat /tmp/phase6-contract.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Phase 6 contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-contract-diagnostics
          path: /tmp/phase6-contract.log
          retention-days: 3
      - name: Enforce Phase 6 shared viewer contract
        if: steps.phase6.outputs.status != '0'
        run: exit 1
      - name: Report regression contracts
        run: |
          npm run qa:business-report-ui
          npm run qa:admin-reports
          npm run qa:business-report-phase5
      - name: CSS and route contracts
        run: |
          npm run qa:css
          npm run check:routes
          git diff --check
