name: Apply and verify performance phase 4

on:
  pull_request:
    branches: [building]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'automation/performance-phase4-listing-query-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase4-listing-query-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped listing performance changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          data_path = Path('src/lib/data.ts')
          data = data_path.read_text()

          cache_import = "import { cachedPublicQuery, invalidatePublicQueryCache } from './publicQueryCache';\n"
          anchor = "import { locationKeyFromLabel, locationOptionFromValue } from './locationTaxonomy';\n"
          if cache_import not in data:
              if anchor not in data:
                  raise SystemExit('data.ts import anchor not found')
              data = data.replace(anchor, anchor + cache_import, 1)

          facets_start = data.index('export async function listBusinessFacets')
          facets_end = data.index('\n\nexport async function listBusinesses', facets_start)
          facets_block = '''type BusinessFacetRow = {
            city: string;
            city_key: string;
            country_iso2: string;
            industry: string;
            industry_key: string;
            deal_type: string;
            plan: string;
            quality_score: number | null;
          };

          const BUSINESS_FACET_CACHE_KEY = 'public:businesses:facets';
          const BUSINESS_FACET_CACHE_TTL_MS = 30_000;

          async function fetchBusinessFacets(filters: any = {}): Promise<BusinessFacetRow[]> {
            let q: any = supabase
              .from('public_businesses_safe')
              .select('city, city_key, country_iso2, industry, industry_key, deal_type, plan, quality_score');
            q = applyBusinessPublicFilters(q, {
              search: filters.search,
              country: filters.country,
            });
            const { data, error } = await q.limit(1000);
            if (error) throw error;
            return ((data || []) as any[]).map((row) => {
              const countryIso2 = clean(row.country_iso2) || 'VN';
              const cityKey =
                locationKeyFromLabel(row.city_key, countryIso2) ||
                locationKeyFromLabel(row.city, countryIso2) ||
                clean(row.city_key);
              return { ...row, country_iso2: countryIso2, city_key: cityKey };
            });
          }

          export function listBusinessFacets(filters: any = {}): Promise<BusinessFacetRow[]> {
            const search = clean(filters.search || filters.q).toLowerCase();
            const country = clean(filters.country).toUpperCase();
            const key = `${BUSINESS_FACET_CACHE_KEY}:${country}:${search}`;
            return cachedPublicQuery(
              key,
              () => fetchBusinessFacets({
                search: search || undefined,
                country: country || undefined,
              }),
              BUSINESS_FACET_CACHE_TTL_MS,
            );
          }

          export function invalidateBusinessFacetCache() {
            invalidatePublicQueryCache(BUSINESS_FACET_CACHE_KEY);
          }'''
          data = data[:facets_start] + facets_block + data[facets_end:]

          if 'export async function listBusinessesPage' not in data:
              list_start = data.index('export async function listBusinesses(')
              list_end = data.index('\n\n\nexport async function listHomepageBusinesses', list_start)
              list_block = data[list_start:list_end]
              page_block = '''

          export async function listBusinessesPage(filters: any = {}): Promise<{ rows: any[]; total: number }> {
            const select = filters.includeHidden
              ? '*, business_files(count), business_images(count)'
              : businessPublicSelect;
            const source = filters.includeHidden ? 'businesses' : 'public_businesses_safe';
            let q: any = supabase.from(source).select(select as string, { count: 'exact' });
            q = applyBusinessPublicFilters(q, filters);
            const sort = filters.sort || 'featured';
            if (sort === 'revenue') q = q.order('revenue_2025', { ascending: false, nullsFirst: false });
            else if (sort === 'ask') q = q.order('ask_amount', { ascending: false, nullsFirst: false });
            else if (sort === 'quality' || sort === 'featured') {
              q = q
                .order('quality_score', { ascending: false, nullsFirst: false })
                .order('created_at', { ascending: false });
            } else q = q.order('created_at', { ascending: false });
            q = applyPagination(q, filters);
            const { data, count, error } = await q;
            if (error) throw error;
            const rows = ((data || []) as any[]).map(getPublicBusinessView);
            return { rows, total: count ?? rows.length };
          }'''
              data = data[:list_start] + list_block + page_block + data[list_end:]

          data_path.write_text(data)

          businesses_path = Path('src/pages/Businesses.tsx')
          businesses = businesses_path.read_text()
          businesses = businesses.replace(
              "import { countBusinesses, listBusinesses, listBusinessFacets } from '../lib/data';",
              "import { listBusinessesPage, listBusinessFacets } from '../lib/data';",
              1,
          )
          businesses = businesses.replace(
              "const PAGE_SIZE = 20;",
              "const PAGE_SIZE = 20;\nconst BUSINESS_LIST_LOAD_ERROR = '__d68_business_list_load_error__';",
              1,
          )
          old_load = "const [data, count] = await Promise.all([listBusinesses(filters), countBusinesses(filters).catch(() => null)]);\n        if (!live) return;\n        setRows((data || []).map(normalizeBusiness).filter((d) => d.slug));\n        setTotal(count);"
          new_load = "const result = await listBusinessesPage(filters);\n        if (!live) return;\n        setRows((result.rows || []).map(normalizeBusiness).filter((d) => d.slug));\n        setTotal(result.total);"
          if old_load not in businesses:
              raise SystemExit('Businesses list/count block not found')
          businesses = businesses.replace(old_load, new_load, 1)
          businesses = businesses.replace(
              "setError(e?.message || T(lang, 'Không tải được dữ liệu doanh nghiệp.', 'Could not load businesses.'));",
              "setError(e?.message || BUSINESS_LIST_LOAD_ERROR);",
              1,
          )
          businesses = businesses.replace(
              "}, [page, tx, sort, query, cities, industries, revenueBand, quality70, featuredOnly, lang]);",
              "}, [page, tx, sort, query, cities, industries, revenueBand, quality70, featuredOnly]);",
              1,
          )
          businesses = businesses.replace(
              '{error ? <div className="d68-list-error" role="alert">{error}</div> : null}',
              "{error ? <div className=\"d68-list-error\" role=\"alert\">{error === BUSINESS_LIST_LOAD_ERROR ? T(lang, 'Không tải được dữ liệu doanh nghiệp.', 'Could not load businesses.') : error}</div> : null}",
              1,
          )
          businesses_path.write_text(businesses)

          investors_path = Path('src/pages/Investors.tsx')
          investors = investors_path.read_text()
          investors = investors.replace(
              "const PAGE_SIZE = 20;",
              "const PAGE_SIZE = 20;\nconst INVESTOR_LIST_LOAD_ERROR = '__d68_investor_list_load_error__';",
              1,
          )
          old_error = '''setError(
                    loadError?.message ||
                      T(
                        lang,
                        'Không tải được dữ liệu nhà đầu tư.',
                        'Could not load investors.',
                      ),
                  );'''
          if old_error not in investors:
              raise SystemExit('Investors error block not found')
          investors = investors.replace(
              old_error,
              'setError(loadError?.message || INVESTOR_LIST_LOAD_ERROR);',
              1,
          )
          investors = investors.replace(
              "}, [page, type, country, industry, stage, dealType, minTicket, search, lang]);",
              "}, [page, type, country, industry, stage, dealType, minTicket, search]);",
              1,
          )
          investors = investors.replace(
              '{error ? <div className="d68-investors-error">{error}</div> : null}',
              "{error ? <div className=\"d68-investors-error\">{error === INVESTOR_LIST_LOAD_ERROR ? T(lang, 'Không tải được dữ liệu nhà đầu tư.', 'Could not load investors.') : error}</div> : null}",
              1,
          )
          investors_path.write_text(investors)
          PY

          cat > scripts/deals68-performance-phase4-check.mjs <<'EOF'
          #!/usr/bin/env node
          import fs from 'node:fs';

          const data = fs.readFileSync('src/lib/data.ts', 'utf8');
          const businesses = fs.readFileSync('src/pages/Businesses.tsx', 'utf8');
          const investors = fs.readFileSync('src/pages/Investors.tsx', 'utf8');
          const failures = [];
          const check = (condition, message) => {
            if (!condition) failures.push(message);
          };

          check(/export async function listBusinessesPage/.test(data), 'Combined Business page query is missing');
          check(/select\(select as string, \{ count: 'exact' \}\)/.test(data), 'Business rows and exact count must share one request');
          check(/return \{ rows, total: count \?\? rows\.length \}/.test(data), 'Business page result contract changed');
          check(/BUSINESS_FACET_CACHE_TTL_MS = 30_000/.test(data), 'Business facet cache TTL must remain 30 seconds');
          check(/cachedPublicQuery\(/.test(data) && /public:businesses:facets/.test(data), 'Business facets must use shared query cache');
          check(/listBusinessesPage\(filters\)/.test(businesses), 'Businesses page must use combined rows/count query');
          check(!/countBusinesses/.test(businesses) && !/listBusinesses\(filters\)/.test(businesses), 'Businesses page still performs duplicate rows/count requests');
          check(/featuredOnly\]\);/.test(businesses), 'Businesses data effect must not depend on language');
          check(/BUSINESS_LIST_LOAD_ERROR/.test(businesses), 'Businesses localized error fallback is missing');
          check(/search\]\);/.test(investors), 'Investors data effect must not depend on language');
          check(/INVESTOR_LIST_LOAD_ERROR/.test(investors), 'Investors localized error fallback is missing');
          check(!/search, lang\]\);/.test(investors), 'Investors still reloads listings on locale switch');

          if (failures.length) {
            failures.forEach((failure) => console.error(`✗ ${failure}`));
            process.exit(1);
          }
          console.log('✓ Performance Phase 4 contract: 12/12 PASS');
          EOF
          chmod +x scripts/deals68-performance-phase4-check.mjs

          cat > /tmp/performance-phase4-metrics.json <<'EOF'
          {
            "baseline": {
              "businessColdListRequests": 3,
              "businessFilterChangeRequests": 2,
              "businessLocaleSwitchRequests": 2,
              "businessFacetRevisitWithin30SecondsRequests": 1,
              "investorLocaleSwitchLoaderExecutions": 1
            },
            "optimized": {
              "businessColdListRequests": 2,
              "businessFilterChangeRequests": 1,
              "businessLocaleSwitchRequests": 0,
              "businessFacetRevisitWithin30SecondsRequests": 0,
              "investorLocaleSwitchLoaderExecutions": 0
            },
            "improvement": {
              "businessColdListRequestReductionPct": 33.3,
              "businessFilterChangeRequestReductionPct": 50,
              "businessLocaleSwitchRequestReductionPct": 100,
              "businessFacetRevisitRequestReductionPct": 100,
              "investorLocaleSwitchLoaderReductionPct": 100
            },
            "facetCacheTtlMs": 30000,
            "scope": "Public Business and Investor listing data loading only; no UI, wording, route, auth, proposal, payment, Supabase schema or business workflow changes"
          }
          EOF
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Phase 4 contract QA
        run: node scripts/deals68-performance-phase4-check.mjs
      - name: Core regression QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
          git diff --check
      - name: Commit verified runtime changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/performance-phase4-apply-and-qa.yml
          git add src/lib/data.ts src/pages/Businesses.tsx src/pages/Investors.tsx scripts/deals68-performance-phase4-check.mjs
          git commit -m "perf(listings): combine business count and cache public facets"
          git push origin HEAD:automation/performance-phase4-listing-query-20260721
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase4-metrics
          path: /tmp/performance-phase4-metrics.json
          if-no-files-found: warn
          retention-days: 7
