name: Admin Reports Phase 4 QA

on:
  push:
    branches: [main, building]
    paths:
      - 'src/features/adminReports/**'
      - 'src/config/adminNavigation.ts'
      - 'src/main.tsx'
      - 'scripts/deals68-admin-reports-phase4-check.mjs'
      - 'package.json'
      - '.github/workflows/admin-reports-phase4-qa.yml'
  pull_request:
    branches: [main, building]
    paths:
      - 'src/features/adminReports/**'
      - 'src/config/adminNavigation.ts'
      - 'src/main.tsx'
      - 'scripts/deals68-admin-reports-phase4-check.mjs'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-reports-phase4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build
        run: npm run build
      - name: Admin Reports Phase 4 contract
        run: npm run qa:admin-reports
      - name: Core regression contracts
        run: |
          npm run qa:business-report-ui
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
          git diff --check
