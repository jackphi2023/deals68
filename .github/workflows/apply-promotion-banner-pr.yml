name: Apply and verify Promotion Banner fix

on:
  pull_request:
    branches:
      - building
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply scoped source patch
        run: |
          mkdir -p src/styles/components
          python3 scripts/apply-promotion-banner-wide-fix.py

      - name: Verify source contracts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          pipeline = Path('src/lib/bannerImagePipeline.ts').read_text()
          admin = Path('src/pages/AdminBanners.tsx').read_text()
          public_css = Path('src/styles/components/promotion-banner.css').read_text()
          foundation = Path('src/styles/final/release-foundation.css').read_text()
          assert 'acceptedRatioMin: 3.6' in pipeline
          assert 'acceptedRatioMax: 5.4' in pipeline
          assert 'targetRatio: 9 / 2' in pipeline
          assert 'Preview toàn ảnh · không crop' in admin
          assert 'object-fit: contain' in public_css
          assert 'height: auto' in public_css
          assert 'padding-top:50px' not in foundation
          print('Promotion Banner wide-ratio contracts: PASS')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Check diff formatting
        run: git diff --check

      - name: Commit verified source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/bannerImagePipeline.ts src/pages/AdminBanners.tsx src/components/SiteBanners.tsx src/styles/pages/admin-banners-performance.css src/styles/components/promotion-banner.css src/styles/final/release-foundation.css src/styles/index.css
          git commit -m "fix(banners): support wide promotion images without crop"
          git push origin HEAD:${{ github.head_ref }}
