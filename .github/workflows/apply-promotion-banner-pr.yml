name: Apply and verify Promotion Banner fix

on:
  pull_request:
    branches:
      - building
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply scoped source patches
        run: |
          mkdir -p src/styles/components
          if grep -q "Promotion 1600×550" src/lib/bannerImagePipeline.ts; then
            python3 scripts/apply-promotion-banner-wide-fix.py
          fi
          if [ -f src/pages/AdminBanners.tsx ]; then
            python3 scripts/integrate-admin-banner-module.py
          fi

      - name: Verify source contracts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          pipeline = Path('src/lib/bannerImagePipeline.ts').read_text()
          admin_page = Path('src/pages/Admin.tsx').read_text()
          app = Path('src/App.tsx').read_text()
          public_site = Path('src/components/SiteBanners.tsx').read_text()
          public_css = Path('src/styles/components/promotion-banner.css').read_text()
          foundation = Path('src/styles/final/release-foundation.css').read_text()
          assert 'acceptedRatioMin: 3.6' in pipeline
          assert 'acceptedRatioMax: 5.4' in pipeline
          assert 'targetRatio: 9 / 2' in pipeline
          assert Path('src/components/admin/AdminBannerManager.tsx').exists()
          assert not Path('src/pages/AdminBanners.tsx').exists()
          assert "components/admin/AdminBannerManager" in admin_page
          assert '<Route path="/admin/banners" element={<Admin/>}/>' in app
          assert '<Route path="/admin/banner" element={<Admin/>}/>' in app
          assert 'AdminBanners' not in app
          assert 'AdminBannerManager' not in public_site
          assert 'object-fit: contain' in public_css
          assert 'height: auto' in public_css
          assert 'padding-top:50px' not in foundation
          print('Promotion Banner and Admin shell contracts: PASS')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Check diff formatting
        run: git diff --check

      - name: Commit verified source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(banners): integrate wide promotion manager into Admin"
          git push origin HEAD:${{ github.head_ref }}
