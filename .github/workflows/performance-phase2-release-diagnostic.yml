name: Capture performance phase 2 release QA

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run and capture release QA
        shell: bash
        run: |
          set +e
          npm run qa:release > /tmp/phase2-release-qa.log 2>&1
          status=$?
          set -e
          cat /tmp/phase2-release-qa.log
          echo "$status" > /tmp/phase2-release-qa-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: performance-phase2-release-qa-log
          path: |
            /tmp/phase2-release-qa.log
            /tmp/phase2-release-qa-status.txt
          retention-days: 7
