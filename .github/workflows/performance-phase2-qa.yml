name: Verify performance phase 2

on:
  pull_request:
    branches: [building]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install and build optimized branch
        run: |
          npm ci
          npm run build
          cp -R dist /tmp/phase2-optimized-dist
      - name: Build exact baseline commit
        shell: bash
        run: |
          git worktree add /tmp/phase2-baseline e071cd635d36099c35d90788afbf8298e1558d3a
          cd /tmp/phase2-baseline
          npm ci
          npm run build
      - name: Measure baseline and optimized bundles
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const zlib = require('zlib');
          function files(dir, extension) {
            const out = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) out.push(...files(full, extension));
              else if (entry.name.endsWith(extension)) out.push(full);
            }
            return out;
          }
          function bytes(file) {
            const content = fs.readFileSync(file);
            return { raw: content.length, gzip: zlib.gzipSync(content, { level: 9 }).length };
          }
          function summarize(dist) {
            const js = files(dist, '.js');
            const css = files(dist, '.css');
            const html = fs.readFileSync(path.join(dist, 'index.html'), 'utf8');
            const referenced = [...html.matchAll(/(?:src|href)="([^"]+\.(?:js|css))"/g)]
              .map((match) => match[1].replace(/^\//, ''))
              .filter((value) => value.startsWith('assets/'));
            const initialFiles = [...new Set(referenced)]
              .map((relative) => path.join(dist, relative))
              .filter((file) => fs.existsSync(file));
            const sum = (list) => list.reduce((acc, file) => {
              const size = bytes(file);
              acc.raw += size.raw;
              acc.gzip += size.gzip;
              return acc;
            }, { raw: 0, gzip: 0 });
            const largestJs = js
              .map((file) => ({ file: path.basename(file), ...bytes(file) }))
              .sort((a, b) => b.raw - a.raw)[0];
            return {
              initial: sum(initialFiles),
              initialFiles: initialFiles.map((file) => path.basename(file)),
              totalJs: sum(js),
              totalCss: sum(css),
              jsChunks: js.length,
              cssChunks: css.length,
              largestJs,
            };
          }
          const baseline = summarize('/tmp/phase2-baseline/dist');
          const optimized = summarize('/tmp/phase2-optimized-dist');
          const pct = (before, after) => before ? Number((((before - after) / before) * 100).toFixed(2)) : 0;
          const report = {
            baselineCommit: 'e071cd635d36099c35d90788afbf8298e1558d3a',
            optimizedCommit: process.env.GITHUB_SHA,
            baseline,
            optimized,
            improvement: {
              initialRawPct: pct(baseline.initial.raw, optimized.initial.raw),
              initialGzipPct: pct(baseline.initial.gzip, optimized.initial.gzip),
              largestJsRawPct: pct(baseline.largestJs.raw, optimized.largestJs.raw),
              largestJsGzipPct: pct(baseline.largestJs.gzip, optimized.largestJs.gzip),
            },
          };
          fs.writeFileSync('/tmp/performance-phase2-metrics.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          if (optimized.initial.gzip >= baseline.initial.gzip) throw new Error('Initial gzip payload did not improve.');
          if (optimized.largestJs.gzip >= baseline.largestJs.gzip) throw new Error('Largest JS chunk did not improve.');
          NODE
      - name: Verify route split contracts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const app = fs.readFileSync('src/App.tsx', 'utf8');
          const vite = fs.readFileSync('vite.config.ts', 'utf8');
          const eagerPages = [...app.matchAll(/^import .* from '\.\/pages\/(.+)';$/gm)].map((m) => m[1]);
          if (eagerPages.join(',') !== 'Home') throw new Error(`Unexpected eager pages: ${eagerPages.join(',')}`);
          const required = ['Businesses','BusinessDetail','Investors','InvestorDetail','Pricing','Login','ForgotPassword','ResetPassword','Register','Valuation','ModuleScreen','NotFound'];
          for (const page of required) {
            if (!app.includes(`import('./pages/${page}')`)) throw new Error(`Missing lazy route: ${page}`);
          }
          if (!app.includes('requestIdleCallback') || !app.includes("effectiveType === '2g'")) throw new Error('Safe idle prefetch guard missing.');
          for (const chunk of ['react-vendor','supabase-vendor','icons-vendor']) {
            if (!vite.includes(`'${chunk}'`)) throw new Error(`Missing vendor chunk: ${chunk}`);
          }
          console.log('Route split and prefetch contracts passed.');
          NODE
          git diff --check
      - name: CSS architecture QA
        run: npm run qa:css
      - name: Migration state QA
        run: npm run qa:migrations
      - name: Route contract QA
        run: npm run check:routes
      - name: Release QA
        run: npm run qa:release
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase2-metrics
          path: /tmp/performance-phase2-metrics.json
          if-no-files-found: warn
          retention-days: 7
