name: Verify static pages content v2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Repair and verify static-page source
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          page = Path('src/pages/StaticPages.tsx')
          text = page.read_text(encoding='utf-8')
          text = text.replace('title="B)}<t đầu từ một hồ sơ có chất lượng"', 'title="Bắt đầu từ một hồ sơ có chất lượng"')
          page.write_text(text, encoding='utf-8')

          terms = Path('src/content/staticTermsContent1.ts').read_text(encoding='utf-8') + Path('src/content/staticTermsContent2.ts').read_text(encoding='utf-8')
          privacy = Path('src/content/staticPrivacyContent1.ts').read_text(encoding='utf-8') + Path('src/content/staticPrivacyContent2.ts').read_text(encoding='utf-8')
          css = Path('src/styles/pages/static.css').read_text(encoding='utf-8')

          checks = {
              'About hero': 'Nền tảng giao dịch tư nhân cho doanh nghiệp Việt toàn cầu' in text,
              'About CTA integrity': 'Bắt đầu từ một hồ sơ có chất lượng' in text and 'B)}<t' not in text,
              'About exactly two line icons': text.count('<GoalIcon />') == 1 and text.count('<GlobeIcon />') == 1,
              'About no legacy icon arrays': 'const pillars =' not in text and 'const flows =' not in text,
              'Blue icon CSS': 'color:#1BADEA' in css and 'stroke:currentColor' in css,
              'Terms warning removed': 'function Notice' not in text and '<Notice' not in text,
              'Privacy CTA removed': 'Questions about privacy?' not in text and 'Câu hỏi về dữ liệu riêng tư?' not in text,
              'Terms section count': len(re.findall(r'viTitle:', terms)) == 28,
              'Privacy section count': len(re.findall(r'viTitle:', privacy)) == 20,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Static-page source checks failed: ' + ', '.join(failed))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit verified update to feature branch
        shell: bash
        run: |
          rm -f scripts/apply-static-pages-v2.py
          rm -f .github/workflows/apply-static-pages-content-v2.yml
          rm -f docs/.static-pages-v2-trigger docs/.static-pages-v2-trigger-2 docs/.static-pages-v2-trigger-3 docs/.static-pages-v2-trigger-4 docs/.static-pages-v2-trigger-5 docs/.static-pages-v2-trigger-6 docs/.static-pages-v2-trigger-7 docs/.static-pages-v2-trigger-8 docs/.static-pages-v2-trigger-9
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "fix(static): verify bilingual page content integrity"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
