name: Verify performance phase 5 on pull request

on:
  pull_request:
    branches: [building]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'automation/performance-phase5-payload-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase5-payload-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped payload changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/performance-phase5-payload.yml').read_text().splitlines()
          marker = next(i for i, line in enumerate(lines) if line.strip() == '- name: Apply scoped payload projection changes')
          run_line = next(i for i in range(marker, len(lines)) if lines[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(lines)) if lines[i].strip() == '- name: Install dependencies')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[run_line + 1:end]) + '\n'
          Path('/tmp/apply-phase5.sh').write_text(script)
          PY
          bash /tmp/apply-phase5.sh
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Performance contract QA
        run: node scripts/deals68-performance-phase5-check.mjs
      - name: Core regression QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
          git diff --check
      - name: Verify UI and CSS scope
        shell: bash
        run: |
          changed="$(git diff --name-only HEAD)"
          echo "$changed"
          if echo "$changed" | grep -E '\.(css|scss|sass|less)$'; then exit 1; fi
          if echo "$changed" | grep -E '^src/(pages|components)/'; then exit 1; fi
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .github/workflows/performance-phase5-payload.yml
          rm -f .github/workflows/performance-phase5-pr.yml
          rm -f performance-phase5-trigger.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/data.ts scripts/deals68-performance-phase5-check.mjs .github/workflows/performance-phase5-payload.yml .github/workflows/performance-phase5-pr.yml performance-phase5-trigger.txt
          git commit -m "perf(data): trim business collection payloads"
          git push origin HEAD:automation/performance-phase5-payload-20260721
