name: Dashboard Profile Review Alert QA

on:
  push:
    branches: [main, building, fix/dashboard-profile-review-alert-20260721]
    paths:
      - 'src/main.tsx'
      - 'src/features/dashboardReview/**'
      - 'scripts/deals68-dashboard-profile-review-alert-check.mjs'
      - '.github/workflows/dashboard-profile-review-alert-qa.yml'
  pull_request:
    branches: [main, building]
    paths:
      - 'src/main.tsx'
      - 'src/features/dashboardReview/**'
      - 'scripts/deals68-dashboard-profile-review-alert-check.mjs'
      - '.github/workflows/dashboard-profile-review-alert-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-profile-review-alert-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production frontend build
        run: npm run build
      - name: Pending profile review alert contract
        run: node scripts/deals68-dashboard-profile-review-alert-check.mjs
      - name: CSS and route regression
        run: |
          npm run qa:css
          npm run check:routes
          git diff --check
