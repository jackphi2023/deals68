name: Apply homepage valuation structure refactor

on:
  push:
    branches:
      - building
    paths:
      - .github/workflows/apply-home-valuation-structure.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped refactor
        run: python3 scripts/apply-home-valuation-structure.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit verified source and remove one-time files
        shell: bash
        run: |
          rm -f scripts/apply-home-valuation-structure.py
          rm -f .github/workflows/apply-home-valuation-structure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(home): separate valuation section from container"
          git push origin HEAD:building
