name: Admin Investor Plans Phase 4 Runner

on:
  push:
    branches:
      - feature/admin-investor-plans-phase4-20260723

permissions:
  contents: write

jobs:
  implement-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply Admin Investor plan UX
        run: python scripts/admin_investor_plans_phase4_apply.py

      - name: Install dependencies
        run: npm ci

      - name: Admin Investor plan contract
        run: npm run qa:admin-investor-plans

      - name: Investor entitlement regression
        run: npm run qa:investor-plans

      - name: Investor pricing regression
        run: npm run qa:investor-pricing

      - name: Production build
        run: npm run build

      - name: CSS architecture regression
        run: npm run qa:css

      - name: Route regression
        run: npm run check:routes

      - name: Diff formatting
        run: git diff --check

      - name: Commit verified source
        run: |
          rm -f .github/workflows/admin-investor-plans-phase4.yml
          rm -f .github/workflows/admin-investor-plans-phase4-runner.yml
          rm -f scripts/admin_investor_plans_phase4_apply.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add Admin Investor plan management Phase 4"
          git push origin HEAD:${GITHUB_REF_NAME}
