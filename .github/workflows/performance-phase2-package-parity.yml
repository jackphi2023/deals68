name: Compare package QA parity for performance phase 2

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: read

jobs:
  package-parity:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Compare every package check against baseline
        shell: bash
        run: |
          cat > /tmp/run-package-checks.cjs <<'NODE'
          const { spawnSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const root = process.argv[2];
          const output = process.argv[3];
          const source = fs.readFileSync(path.join(root, 'scripts/deals68-package-checks.mjs'), 'utf8');
          const scripts = [...source.matchAll(/'([^']+\.mjs)'/g)].map((m) => m[1]);
          const failures = [];
          const lines = [];
          for (const script of scripts) {
            const result = spawnSync(process.execPath, [script], {
              cwd: root,
              encoding: 'utf8',
            });
            const status = result.status ?? 1;
            lines.push(`=== ${script} :: ${status} ===`);
            lines.push(result.stdout || '');
            lines.push(result.stderr || '');
            if (status !== 0) failures.push(script);
          }
          fs.writeFileSync(output, JSON.stringify({ failures, lines }, null, 2));
          console.log(JSON.stringify({ failures }, null, 2));
          NODE

          node /tmp/run-package-checks.cjs "$GITHUB_WORKSPACE" /tmp/current-package-results.json
          git worktree add /tmp/phase2-baseline e071cd635d36099c35d90788afbf8298e1558d3a
          node /tmp/run-package-checks.cjs /tmp/phase2-baseline /tmp/baseline-package-results.json

          node <<'NODE'
          const fs = require('fs');
          const current = JSON.parse(fs.readFileSync('/tmp/current-package-results.json', 'utf8'));
          const baseline = JSON.parse(fs.readFileSync('/tmp/baseline-package-results.json', 'utf8'));
          console.log('Current failures:', current.failures);
          console.log('Baseline failures:', baseline.failures);
          if (JSON.stringify(current.failures) !== JSON.stringify(baseline.failures)) {
            throw new Error('Package QA failure set changed after Phase 2.');
          }
          console.log('Package QA failure set is identical to baseline.');
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase2-package-parity
          path: |
            /tmp/current-package-results.json
            /tmp/baseline-package-results.json
          retention-days: 7
