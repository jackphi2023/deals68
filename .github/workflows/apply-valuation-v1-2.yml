name: Apply valuation formula v1.2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: deals68-valuation-v1-2
  cancel-in-progress: false

jobs:
  apply-verify-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Preserve applicator outside repository
        run: cp scripts/apply_valuation_v1_2.py /tmp/apply_valuation_v1_2.py

      - name: Apply formula-only update
        run: python3 /tmp/apply_valuation_v1_2.py

      - name: Verify changed-file scope
        run: |
          allowed='^(src/lib/valuationEngine.ts|scripts/deals68-asset-valuation-v1-check.mjs|scripts/apply_valuation_v1_2.py|.github/workflows/apply-valuation-v1-2.yml)$'
          unexpected=$(git status --short | awk '{print $2}' | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo 'Unexpected out-of-scope files:'
            echo "$unexpected"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Valuation v1.2 QA
        run: npm run qa:asset-valuation

      - name: Diff validation
        run: git diff --check

      - name: Remove temporary applicator and workflow
        run: git rm scripts/apply_valuation_v1_2.py .github/workflows/apply-valuation-v1-2.yml

      - name: Commit verified formula update to building
        run: |
          git config user.name "Deals68 Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(valuation): implement unified v1.2 formula"
          git push origin HEAD:building
