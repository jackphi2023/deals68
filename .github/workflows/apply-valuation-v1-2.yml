name: Apply valuation formula v1.2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: deals68-valuation-v1-2
  cancel-in-progress: false

jobs:
  diagnose-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply formula-only update
        run: python3 scripts/apply_valuation_v1_2.py

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Valuation v1.2 QA diagnostic
        run: |
          set +e
          npm run qa:asset-valuation > /tmp/valuation-v1-2.log 2>&1
          status=$?
          tail -n 80 /tmp/valuation-v1-2.log
          exit "$status"
