name: Apply valuation formula v1.2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: deals68-valuation-v1-2-final
  cancel-in-progress: false

jobs:
  apply-verify-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout building
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin building
          git checkout -q -B building FETCH_HEAD

      - name: Prepare CommonJS valuation QA harness
        run: |
          cp scripts/apply_valuation_v1_2.py /tmp/apply_valuation_v1_2.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply_valuation_v1_2.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ("import { pathToFileURL } from 'node:url';", "import { createRequire } from 'node:module';"),
              ("`deals68-valuation-v1-2-${Date.now()}.mjs`", "`deals68-valuation-v1-2-${Date.now()}.cjs`"),
              ("'--format=esm',", "'--format=cjs',"),
              ("const { valuate, DEFAULT_VALUATION_CONFIG } = await import(`${pathToFileURL(bundlePath).href}?v=${Date.now()}`);", "const require = createRequire(import.meta.url);\nconst { valuate, DEFAULT_VALUATION_CONFIG } = require(bundlePath);")
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Missing QA harness marker: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply formula-only update
        run: python3 /tmp/apply_valuation_v1_2.py

      - name: Verify changed-file scope
        run: |
          allowed='^(src/lib/valuationEngine.ts|scripts/deals68-asset-valuation-v1-check.mjs|scripts/apply_valuation_v1_2.py|.github/workflows/apply-valuation-v1-2.yml)$'
          unexpected=$(git status --short | awk '{print $2}' | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo 'Unexpected out-of-scope files:'
            echo "$unexpected"
            exit 1
          fi

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Production build
        run: npm run build

      - name: Valuation v1.2 numerical QA
        run: npm run qa:asset-valuation

      - name: Diff validation
        run: git diff --check

      - name: Remove temporary applicator and workflow
        run: git rm scripts/apply_valuation_v1_2.py .github/workflows/apply-valuation-v1-2.yml

      - name: Commit verified formula update to building
        run: |
          git config user.name "Deals68 Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(valuation): implement unified v1.2 formula"
          git push origin HEAD:building
