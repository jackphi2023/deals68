name: Apply valuation formula v1.2

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  diagnose-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout building
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin building
          git checkout -q -B building FETCH_HEAD

      - name: Apply formula-only update
        run: python3 scripts/apply_valuation_v1_2.py

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Valuation v1.2 QA diagnostic
        run: |
          set +e
          npm run qa:asset-valuation > /tmp/valuation-v1-2.log 2>&1
          status=$?
          cat /tmp/valuation-v1-2.log
          exit "$status"
