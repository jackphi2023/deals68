name: Business Register category and email fix

on:
  pull_request:
    branches: [building]
    paths:
      - 'src/pages/Register.tsx'
      - 'scripts/apply-business-register-category-email-v1.mjs'
      - '.github/workflows/business-register-category-email-v1.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply patch if needed
        run: |
          if [ -f scripts/apply-business-register-category-email-v1.mjs ]; then
            node scripts/apply-business-register-category-email-v1.mjs
            rm scripts/apply-business-register-category-email-v1.mjs
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/pages/Register.tsx scripts/apply-business-register-category-email-v1.mjs
            git commit -m "fix(register): require business category selection and localize email errors" || true
            git push
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify source contract
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('src/pages/Register.tsx', 'utf8');
          const checks = [
            ["const [industry, setIndustry] = useState('');", 'industry starts empty'],
            ["{T(lang, 'Chọn danh mục', 'Select category')}", 'category placeholder exists'],
            ["registrationErrorMessage(\n          lang,\n          submitError?.message", 'catch uses localized registration error mapper'],
            ["'Email không hợp lệ/đã đăng ký.'", 'Vietnamese email message exists'],
          ];
          for (const [needle, label] of checks) {
            if (!source.includes(needle)) throw new Error(`Missing contract: ${label}`);
          }
          NODE

      - name: Production build
        run: npm run build

      - name: Diff check
        run: git diff --check
