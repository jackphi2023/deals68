name: Session 6 Admin Business Moderation Runner

on:
  pull_request:
    branches:
      - building
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply-build-and-clean:
    if: github.event.pull_request.head.ref == 'fix/admin-business-financial-moderation-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Session 6 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply Session 6 Admin moderation changes
        run: |
          python <<'PY'
          from pathlib import Path

          admin_path = Path('src/pages/Admin.tsx')
          source = admin_path.read_text(encoding='utf-8')

          if 'BUSINESS_FINANCIAL_REVIEW_FIELDS' not in source:
              marker = '\nfunction assetReviewState'
              insert = """

const BUSINESS_FINANCIAL_REVIEW_FIELDS = [
  ['assets_owned_vi', 'Tài sản doanh nghiệp sở hữu (VN)'],
  ['assets_owned_en', 'Assets owned by the business (EN)'],
  ['excluded_physical_asset_value_vi', 'Tài sản vật chất không nằm trong giao dịch (VN)'],
  ['excluded_physical_asset_value_en', 'Physical assets excluded from the transaction (EN)'],
] as const;

const BUSINESS_FINANCIAL_REVIEW_KEYS = BUSINESS_FINANCIAL_REVIEW_FIELDS.map(
  ([key]) => key,
);
"""
              if source.count(marker) != 1:
                  raise SystemExit('Could not insert financial review constants')
              source = source.replace(marker, insert + marker, 1)

          if "labels.push('Thông tin Tài sản & Giao dịch')" not in source:
              old = """  const pending = objectOf(business.pending_changes_json);
  const approved = objectOf(business.public_snapshot_json);
  const labels: string[] = [];
"""
              new = """  const pending = objectOf(business.pending_changes_json);
  const approved = objectOf(business.public_snapshot_json);
  const pendingFinancial = objectOf(pending.financial_input);
  const approvedFinancial = objectOf(approved.financial_input);
  const labels: string[] = [];
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add nested financial review sources')
              source = source.replace(old, new, 1)

              old = """  if (changedAny(pending, approved, ['highlights_vi', 'highlights_en'])) {
    labels.push('Điểm nổi bật');
  }
"""
              new = old + """  if (changedAny(pendingFinancial, approvedFinancial, BUSINESS_FINANCIAL_REVIEW_KEYS)) {
    labels.push('Thông tin Tài sản & Giao dịch');
  }
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add nested financial review label')
              source = source.replace(old, new, 1)

          if 'const approvedFinancialInput = {' not in source:
              marker = '    const adminSnapshot = {'
              insert = """    const approvedFinancialInput = {
      ...objectOf(business.financial_input),
      ...objectOf(objectOf(business.public_snapshot_json).financial_input),
      ...objectOf(objectOf(business.pending_changes_json).financial_input),
    };
"""
              if source.count(marker) != 1:
                  raise SystemExit('Could not insert approved financial input merge')
              source = source.replace(marker, insert + marker, 1)

              old = """      data_confidence: parseFormattedNumber(form.get('data_confidence')),
      hero_image_url: text(form.get('hero_image_url')),
"""
              new = """      data_confidence: parseFormattedNumber(form.get('data_confidence')),
      financial_input: {
        ...approvedFinancialInput,
        assets_owned: text(form.get('assets_owned_vi')) || text(form.get('assets_owned_en')),
        assets_owned_vi: text(form.get('assets_owned_vi')),
        assets_owned_en: text(form.get('assets_owned_en')),
        excluded_physical_asset_value:
          text(form.get('excluded_physical_asset_value_vi')) ||
          text(form.get('excluded_physical_asset_value_en')),
        excluded_physical_asset_value_vi: text(form.get('excluded_physical_asset_value_vi')),
        excluded_physical_asset_value_en: text(form.get('excluded_physical_asset_value_en')),
      },
      hero_image_url: text(form.get('hero_image_url')),
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add financial_input to adminSnapshot')
              source = source.replace(old, new, 1)

          if 'const changedFinancialRows = BUSINESS_FINANCIAL_REVIEW_FIELDS.filter' not in source:
              old = """  const pending = objectOf(business.pending_changes_json);
  const current = { ...business, ...publicOf(business) };
  const fields = [
"""
              new = """  const pending = objectOf(business.pending_changes_json);
  const current = { ...business, ...publicOf(business) };
  const pendingFinancial = objectOf(pending.financial_input);
  const currentFinancial = objectOf(current.financial_input);
  const fields = [
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add financial comparison sources')
              source = source.replace(old, new, 1)

              old = """  const changedRows = fields.filter(([key]) => hasOwn(pending, key) && JSON.stringify(pending[key]) !== JSON.stringify(current[key]));
  if (!changedRows.length) return null;
  return <div className=\"d68-admin-table-wrap\"><table className=\"d68-admin-table\"><thead><tr><th>Trường Business sửa</th><th>Dữ liệu đang public/đã duyệt</th><th>Dữ liệu Business đề xuất</th></tr></thead><tbody>{changedRows.map(([key, label]) => <tr key={key}><td><b>{label}</b></td><td><pre>{adminCompareValue(current[key], key)}</pre></td><td><span className=\"d68-admin-badge warn\">Đã thay đổi</span><pre>{adminCompareValue(pending[key], key)}</pre></td></tr>)}</tbody></table></div>;
"""
              new = """  const changedRows = fields.filter(([key]) => hasOwn(pending, key) && JSON.stringify(pending[key]) !== JSON.stringify(current[key]));
  const changedFinancialRows = BUSINESS_FINANCIAL_REVIEW_FIELDS.filter(
    ([key]) => hasOwn(pendingFinancial, key) && comparable(pendingFinancial[key]) !== comparable(currentFinancial[key]),
  );
  if (!changedRows.length && !changedFinancialRows.length) return null;
  return <div className=\"d68-admin-table-wrap\"><table className=\"d68-admin-table\"><thead><tr><th>Trường Business sửa</th><th>Dữ liệu đang public/đã duyệt</th><th>Dữ liệu Business đề xuất</th></tr></thead><tbody>{changedRows.map(([key, label]) => <tr key={key}><td><b>{label}</b></td><td><pre>{adminCompareValue(current[key], key)}</pre></td><td><span className=\"d68-admin-badge warn\">Đã thay đổi</span><pre>{adminCompareValue(pending[key], key)}</pre></td></tr>)}{changedFinancialRows.map(([key, label]) => <tr key={`financial_input.${key}`}><td><b>{label}</b><br/><code>financial_input.{key}</code></td><td><pre>{adminCompareValue(currentFinancial[key], key)}</pre></td><td><span className=\"d68-admin-badge warn\">Đã thay đổi</span><pre>{adminCompareValue(pendingFinancial[key], key)}</pre></td></tr>)}</tbody></table></div>;
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not replace BusinessPendingComparison rows')
              source = source.replace(old, new, 1)

          if 'const reviewFinancialValue = (key: string' not in source:
              old = """  const source = sourceOf(business);
  const publicRow = publicOf(business);
  const sections = businessReviewSections(business, businessFiles, businessImages);
"""
              new = """  const source = sourceOf(business);
  const publicRow = publicOf(business);
  const pendingFinancial = objectOf(pending.financial_input);
  const sourceFinancial = {
    ...objectOf(business.financial_input),
    ...objectOf(source.financial_input),
  };
  const publicFinancial = objectOf(publicRow.financial_input);
  const sections = businessReviewSections(business, businessFiles, businessImages);
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add editor financial sources')
              source = source.replace(old, new, 1)

              old = """  const reviewLines = (key: string) => lines(reviewValue(key));
  const warningText = sections.length
"""
              new = """  const reviewLines = (key: string) => lines(reviewValue(key));
  const reviewFinancialValue = (key: string, fallback: any = '') => {
    if (hasPending && hasOwn(pendingFinancial, key)) return pendingFinancial[key] ?? '';
    return publicFinancial[key] ?? sourceFinancial[key] ?? fallback;
  };
  const hasPendingFinancialChanges = changedAny(
    pendingFinancial,
    publicFinancial,
    BUSINESS_FINANCIAL_REVIEW_KEYS,
  );
  const warningText = sections.length
"""
              if source.count(old) != 1:
                  raise SystemExit('Could not add editor financial value helper')
              source = source.replace(old, new, 1)

              old = """<input name=\"hero_image_url\" defaultValue={reviewValue('hero_image_url') || reviewValue('image_url')} placeholder=\"Approved hero image URL\" className=\"d68-admin-input d68-admin-span2\"/><label className=\"d68-admin-field d68-admin-span2\"><span>Mô tả/Giới thiệu (hiển thị public, VN)</span>"""
              new = """<input name=\"hero_image_url\" defaultValue={reviewValue('hero_image_url') || reviewValue('image_url')} placeholder=\"Approved hero image URL\" className=\"d68-admin-input d68-admin-span2\"/><div className=\"d68-admin-financial-review-box d68-admin-span4\"><div className=\"d68-admin-row-head\"><div><h3>Thông tin Tài sản & Giao dịch</h3><p className=\"d68-admin-subtle\">Assets & transaction information · Admin kiểm tra và bổ sung độc lập nội dung VN/EN trước khi public.</p></div>{hasPendingFinancialChanges ? <span className=\"d68-admin-badge warn\">⚠️ Business vừa cập nhật, cần duyệt</span> : <span className=\"d68-admin-badge ok\">Không có thay đổi nested chờ duyệt</span>}</div><div className=\"d68-admin-form2\"><label className=\"d68-admin-field\"><span>Tài sản doanh nghiệp sở hữu (VN)</span><textarea name=\"assets_owned_vi\" defaultValue={reviewFinancialValue('assets_owned_vi', reviewFinancialValue('assets_owned'))} placeholder=\"Mô tả tài sản hữu hình/vô hình doanh nghiệp sở hữu\" className=\"d68-admin-input textarea\"/></label><label className=\"d68-admin-field\"><span>Assets owned by the business (EN)</span><textarea name=\"assets_owned_en\" defaultValue={reviewFinancialValue('assets_owned_en')} placeholder=\"Describe tangible and intangible assets owned\" className=\"d68-admin-input textarea\"/></label><label className=\"d68-admin-field\"><span>Tài sản vật chất KHÔNG nằm trong giao dịch (VN)</span><textarea name=\"excluded_physical_asset_value_vi\" defaultValue={reviewFinancialValue('excluded_physical_asset_value_vi', reviewFinancialValue('excluded_physical_asset_value'))} placeholder=\"Mô tả tài sản bị loại trừ khỏi giao dịch\" className=\"d68-admin-input textarea\"/></label><label className=\"d68-admin-field\"><span>Physical assets excluded from the transaction (EN)</span><textarea name=\"excluded_physical_asset_value_en\" defaultValue={reviewFinancialValue('excluded_physical_asset_value_en')} placeholder=\"Describe physical assets excluded from the transaction\" className=\"d68-admin-input textarea\"/></label></div><p className=\"d68-admin-subtle\">Các key khác trong financial_input được giữ nguyên khi Admin duyệt.</p></div><label className=\"d68-admin-field d68-admin-span2\"><span>Mô tả/Giới thiệu (hiển thị public, VN)</span>"""
              if source.count(old) != 1:
                  raise SystemExit('Could not insert financial review editor box')
              source = source.replace(old, new, 1)

          admin_path.write_text(source, encoding='utf-8')

          css_path = Path('src/styles/pages/admin.css')
          css = css_path.read_text(encoding='utf-8')
          if '.d68-admin-financial-review-box' not in css:
              css += """

/* Session 6 — nested Business assets & transaction moderation. */
.d68-admin-span4{grid-column:1 / -1}
.d68-admin-financial-review-box{border:1px solid #F2D27A;background:#FFFBEB;border-radius:12px;padding:14px;margin:4px 0}
.d68-admin-financial-review-box h3{margin:0 0 4px;color:#0F2A4A}
.d68-admin-financial-review-box .d68-admin-row-head{align-items:flex-start;margin-bottom:12px}
.d68-admin-financial-review-box .d68-admin-field textarea{min-height:104px;background:#fff}
@media(max-width:980px){.d68-admin-span4{grid-column:span 1}}
"""
              css_path.write_text(css, encoding='utf-8')

          qa_path = Path('scripts/deals68-admin-business-financial-review-check.mjs')
          qa_path.write_text("""import fs from 'node:fs';
import assert from 'node:assert/strict';

const admin = fs.readFileSync('src/pages/Admin.tsx', 'utf8');
const css = fs.readFileSync('src/styles/pages/admin.css', 'utf8');

for (const token of [
  'BUSINESS_FINANCIAL_REVIEW_FIELDS',
  "labels.push('Thông tin Tài sản & Giao dịch')",
  'const changedFinancialRows = BUSINESS_FINANCIAL_REVIEW_FIELDS.filter',
  'financial_input: {',
  '...approvedFinancialInput',
  "assets_owned_vi: text(form.get('assets_owned_vi'))",
  "assets_owned_en: text(form.get('assets_owned_en'))",
  "excluded_physical_asset_value_vi: text(form.get('excluded_physical_asset_value_vi'))",
  "excluded_physical_asset_value_en: text(form.get('excluded_physical_asset_value_en'))",
  'Thông tin Tài sản & Giao dịch',
  'Assets & transaction information',
  'Business vừa cập nhật, cần duyệt',
  "name=\"assets_owned_vi\"",
  "name=\"assets_owned_en\"",
  "name=\"excluded_physical_asset_value_vi\"",
  "name=\"excluded_physical_asset_value_en\"",
]) assert.ok(admin.includes(token), `Missing Session 6 token: ${token}`);

assert.match(admin, /const approvedFinancialInput = \{[\s\S]*business\.financial_input[\s\S]*public_snapshot_json[\s\S]*pending_changes_json[\s\S]*\};/);
assert.match(admin, /changedAny\([\s\S]*pendingFinancial,[\s\S]*approvedFinancial,[\s\S]*BUSINESS_FINANCIAL_REVIEW_KEYS/);
assert.match(admin, /approve_business_pending_changes[\s\S]*admin_snapshot: adminSnapshot/);
assert.match(css, /\.d68-admin-financial-review-box\{/);
assert.match(css, /\.d68-admin-span4\{grid-column:1 \/ -1\}/);

console.log('✓ Session 6 Admin Business financial moderation contract: PASS');
""", encoding='utf-8')

          package_path = Path('scripts/deals68-package-checks.mjs')
          package_source = package_path.read_text(encoding='utf-8')
          check = "  'scripts/deals68-admin-business-financial-review-check.mjs',\n"
          if check not in package_source:
              marker = "  'scripts/deals68-business-dashboard-overview-spacing-check.mjs',\n"
              if package_source.count(marker) != 1:
                  raise SystemExit('Could not register Session 6 package check')
              package_source = package_source.replace(marker, marker + check, 1)
              package_path.write_text(package_source, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Session 6 contract
        run: node scripts/deals68-admin-business-financial-review-check.mjs

      - name: Package checks
        run: npm run qa:packages

      - name: Production build
        run: npm run build

      - name: Commit clean Session 6 product diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/session6-building-runner.yml
          git rm -f scripts/session6-trigger.txt
          git add src/pages/Admin.tsx src/styles/pages/admin.css scripts/deals68-admin-business-financial-review-check.mjs scripts/deals68-package-checks.mjs
          git diff --cached --check
          git commit -m "fix: moderate Business assets and transaction information"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
