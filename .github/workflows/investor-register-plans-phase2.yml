name: Investor Registration Plans Phase 2

on:
  push:
    branches:
      - feature/investor-register-plans-phase2-20260723
  pull_request:
    branches:
      - building
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply scoped Phase 2 source
        run: node scripts/apply-investor-register-plans-phase2.mjs

      - name: Fix generated migration registry
        run: node scripts/fix-generated-investor-register-phase2.mjs

      - name: Install dependencies
        run: npm ci

      - name: Investor registration plan contract
        run: npm run qa:investor-register-plans

      - name: Investor entitlement regression
        run: npm run qa:investor-plans

      - name: Migration state contract
        run: npm run qa:migrations

      - name: Production build
        run: npm run build

      - name: CSS architecture regression
        run: npm run qa:css

      - name: Route regression
        run: npm run check:routes

      - name: Diff formatting
        run: git diff --check

      - name: Commit verified product source
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          rm -f scripts/apply-investor-register-plans-phase2.mjs
          rm -f scripts/fix-generated-investor-register-phase2.mjs
          rm -f .github/workflows/investor-register-plans-phase2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add Standard and Premium Investor registration"
          git push origin HEAD:${TARGET_BRANCH}
