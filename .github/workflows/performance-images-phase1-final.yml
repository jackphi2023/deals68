name: Apply performance images phase 1 final

on:
  pull_request:
    branches:
      - building
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'automation/performance-images-phase1-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-images-phase1-20260721
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text()

          def write(path, text):
              Path(path).write_text(text)

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 occurrence, found {count}')
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 replacement, found {count}')
              return updated

          write('src/lib/imageUploadOptimization.ts', '''type ImageOptimizationOptions = {
            maxWidth: number;
            maxHeight: number;
            quality?: number;
            minBytes?: number;
          };

          const OPTIMIZABLE_IMAGE_TYPES = new Set([
            'image/jpeg',
            'image/png',
            'image/webp',
          ]);

          function webpName(name: string) {
            const clean = String(name || 'image').replace(/\\.[^.]+$/, '');
            return `${clean || 'image'}.webp`;
          }

          function canvasBlob(canvas: HTMLCanvasElement, quality: number) {
            return new Promise<Blob | null>((resolve) => {
              canvas.toBlob(resolve, 'image/webp', quality);
            });
          }

          export async function optimizeImageBlob(
            input: Blob,
            options: ImageOptimizationOptions,
          ): Promise<Blob> {
            const minBytes = Math.max(0, options.minBytes ?? 180_000);
            if (
              typeof window === 'undefined' ||
              typeof document === 'undefined' ||
              typeof createImageBitmap !== 'function' ||
              !OPTIMIZABLE_IMAGE_TYPES.has(input.type) ||
              input.size < minBytes
            ) {
              return input;
            }

            let bitmap: ImageBitmap | null = null;
            try {
              bitmap = await createImageBitmap(input);
              const scale = Math.min(
                1,
                options.maxWidth / bitmap.width,
                options.maxHeight / bitmap.height,
              );
              const width = Math.max(1, Math.round(bitmap.width * scale));
              const height = Math.max(1, Math.round(bitmap.height * scale));
              const canvas = document.createElement('canvas');
              canvas.width = width;
              canvas.height = height;
              const context = canvas.getContext('2d', { alpha: true });
              if (!context) return input;
              context.drawImage(bitmap, 0, 0, width, height);
              const output = await canvasBlob(
                canvas,
                Math.max(0.72, Math.min(0.95, options.quality ?? 0.88)),
              );
              if (!output || output.size >= input.size * 0.96) return input;
              return output;
            } catch {
              return input;
            } finally {
              bitmap?.close();
            }
          }

          export async function optimizeImageForUpload(
            file: File,
            options: ImageOptimizationOptions,
          ): Promise<File> {
            const optimized = await optimizeImageBlob(file, options);
            if (optimized === file) return file;
            return new File([optimized], webpName(file.name), {
              type: optimized.type || 'image/webp',
              lastModified: file.lastModified || Date.now(),
            });
          }
          ''')

          site_path = 'src/components/SiteBanners.tsx'
          site = read(site_path)
          marker = "  const activeBanner = rows[active] || null;"
          preload = '''  useEffect(() => {
            if (rows.length <= 1 || typeof window === 'undefined') return undefined;
            const connection = (navigator as Navigator & {
              connection?: { saveData?: boolean; effectiveType?: string };
            }).connection;
            if (
              connection?.saveData ||
              connection?.effectiveType === 'slow-2g' ||
              connection?.effectiveType === '2g'
            ) {
              return undefined;
            }

            const next = rows[(active + 1) % rows.length];
            const mobile = window.matchMedia('(max-width: 700px)').matches;
            const nextUrl = cleanUrl(
              mobile ? next?.mobile_image_url || next?.image_url : next?.image_url,
            );
            if (!nextUrl) return undefined;

            const timer = window.setTimeout(() => {
              if (document.visibilityState !== 'visible') return;
              const image = new Image();
              image.decoding = 'async';
              image.fetchPriority = 'low';
              image.src = nextUrl;
            }, 3500);

            return () => window.clearTimeout(timer);
          }, [active, rows]);

          '''
          site = replace_once(site, marker, preload + marker, 'hero restrained preload')
          site = regex_once(
              site,
              r"      \{rows\.map\(\(slide, index\) => \(.*?      \)\)\}\n\n      \{rows\.length > 1",
              '''      {activeBanner ? (
                <MaybeLink
                  key={activeBanner.id}
                  href={activeBanner.link_url}
                  className="d68-hero-slide is-active"
                >
                  <HeroBannerMedia
                    banner={activeBanner}
                    fallback={HERO_FALLBACK}
                    alt={activeBanner.title || 'Deals68 banner'}
                    eager={active === 0}
                  />
                </MaybeLink>
              ) : null}

              {rows.length > 1''',
              'single active hero media',
          )
          write(site_path, site)

          hero_path = 'src/components/HeroBannerMedia.tsx'
          hero = read(hero_path)
          hero = replace_once(
              hero,
              "        fetchPriority={eager ? 'high' : 'auto'}\n        style={style}",
              "        fetchPriority={eager ? 'high' : 'auto'}\n        decoding=\"async\"\n        width={1600}\n        height={600}\n        style={style}",
              'hero decoding and dimensions',
          )
          write(hero_path, hero)

          banners_path = 'src/lib/banners.ts'
          banners = read(banners_path)
          banners = replace_once(
              banners,
              "import type { Lang } from './i18n';",
              "import type { Lang } from './i18n';\nimport { optimizeImageForUpload } from './imageUploadOptimization';",
              'banner optimizer import',
          )
          banners = regex_once(
              banners,
              r"export async function uploadSiteBannerImage\(.*?\n\}\n\nexport async function uploadInvestorCoverImage",
              '''export async function uploadSiteBannerImage(
            file: File,
            placement: BannerPlacement,
            variant: BannerImageVariant = 'desktop',
          ) {
            const optimizedFile = await optimizeImageForUpload(file, {
              maxWidth: variant === 'mobile' ? 900 : 1920,
              maxHeight: variant === 'mobile' ? 1800 : 1200,
              quality: 0.9,
              minBytes: 180_000,
            });
            const safeName = optimizedFile.name.replace(
              /[^a-zA-Z0-9._-]/g,
              '_',
            );
            const path = `${placement}/${variant}/${Date.now()}-${safeName}`;

            const { error: uploadError } = await supabase.storage
              .from('site-banners')
              .upload(path, optimizedFile, {
                upsert: false,
                contentType: optimizedFile.type || 'application/octet-stream',
                cacheControl: '31536000',
              });

            if (uploadError) throw uploadError;

            const { data } = supabase.storage
              .from('site-banners')
              .getPublicUrl(path);

            return {
              path,
              publicUrl: data.publicUrl,
            };
          }

          export async function uploadInvestorCoverImage''',
              'site banner upload function',
          )
          banners = regex_once(
              banners,
              r"export async function uploadInvestorCoverImage\(.*?\n\}",
              '''export async function uploadInvestorCoverImage(
            file: File,
            investorId: string,
          ) {
            const allowedTypes = new Set([
              'image/jpeg',
              'image/png',
              'image/webp',
            ]);
            if (!allowedTypes.has(file.type)) {
              throw new Error('Cover chỉ hỗ trợ JPG, PNG hoặc WebP.');
            }
            if (file.size > 10 * 1024 * 1024) {
              throw new Error('Ảnh cover phải nhỏ hơn hoặc bằng 10 MB.');
            }

            const optimizedFile = await optimizeImageForUpload(file, {
              maxWidth: 1600,
              maxHeight: 900,
              quality: 0.88,
              minBytes: 180_000,
            });
            const safeInvestorId = String(investorId).replace(
              /[^a-zA-Z0-9_-]/g,
              '',
            );
            const safeName = optimizedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const path =
              `investor-covers/${safeInvestorId}/` +
              `${Date.now()}-${safeName}`;

            const { error: uploadError } = await supabase.storage
              .from('site-banners')
              .upload(path, optimizedFile, {
                upsert: false,
                contentType: optimizedFile.type,
                cacheControl: '31536000',
              });

            if (uploadError) throw uploadError;

            const { data } = supabase.storage
              .from('site-banners')
              .getPublicUrl(path);

            return { path, publicUrl: data.publicUrl };
          }''',
              'investor cover upload function',
          )
          write(banners_path, banners)

          asset_path = 'src/lib/businessAssetStorage.ts'
          assets = read(asset_path)
          assets = replace_once(
              assets,
              "import { supabase } from './supabase';",
              "import { supabase } from './supabase';\nimport { optimizeImageBlob } from './imageUploadOptimization';",
              'business image optimizer import',
          )
          assets = replace_once(assets, "cacheControl: '3600',", "cacheControl: '31536000',", 'business image cache')
          assets = replace_once(
              assets,
              '  await uploadBlob(targetBucket, targetPath, sourceBlob, true);',
              '''  const uploadSource =
              targetBucket === BUSINESS_IMAGE_PUBLIC_BUCKET
                ? await optimizeImageBlob(sourceBlob, {
                    maxWidth: 1600,
                    maxHeight: 1200,
                    quality: 0.86,
                    minBytes: 220_000,
                  })
                : sourceBlob;

            await uploadBlob(targetBucket, targetPath, uploadSource, true);''',
              'business approval optimization',
          )
          write(asset_path, assets)

          page = read('src/pages/Home.tsx')
          page = replace_once(page, '<img src={deal.image} alt={deal.title} loading="lazy" />', '<img src={deal.image} alt={deal.title} loading="lazy" decoding="async" fetchPriority="low" width={640} height={360} />', 'home card image')
          write('src/pages/Home.tsx', page)

          page = read('src/pages/Businesses.tsx')
          page = replace_once(page, '<img src={d.image} alt={title} loading="lazy" />', '<img src={d.image} alt={title} loading="lazy" decoding="async" fetchPriority="low" width={640} height={360} />', 'business list image')
          write('src/pages/Businesses.tsx', page)

          page = read('src/pages/BusinessDetail.tsx')
          page = replace_once(page, '<img src={activeHero.url} alt={activeHero.title || title} />', '<img src={activeHero.url} alt={activeHero.title || title} loading="eager" fetchPriority="high" decoding="async" width={1600} height={900} />', 'business detail hero')
          page = replace_once(page, '<img src={img.url} alt={img.title || title} />', '<img src={img.url} alt={img.title || title} loading="lazy" fetchPriority="low" decoding="async" width={320} height={180} />', 'business detail thumb')
          write('src/pages/BusinessDetail.tsx', page)

          page = read('src/pages/InvestorDetail.tsx')
          page = replace_once(
              page,
              '                  <img\n                    src={coverUrl}\n                    alt={T(',
              '                  <img\n                    src={coverUrl}\n                    loading="eager"\n                    fetchPriority="high"\n                    decoding="async"\n                    width={1600}\n                    height={560}\n                    alt={T(',
              'investor cover hints',
          )
          write('src/pages/InvestorDetail.tsx', page)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: CSS architecture QA
        run: npm run qa:css
      - name: Verify contracts and scope
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const site = fs.readFileSync('src/components/SiteBanners.tsx', 'utf8');
          const hero = fs.readFileSync('src/components/HeroBannerMedia.tsx', 'utf8');
          const banners = fs.readFileSync('src/lib/banners.ts', 'utf8');
          const assets = fs.readFileSync('src/lib/businessAssetStorage.ts', 'utf8');
          if (site.includes('{rows.map((slide, index) => (')) throw new Error('All hero slides are still mounted');
          if (!site.includes('}, 3500);')) throw new Error('Restrained next preload missing');
          if (!hero.includes('decoding="async"')) throw new Error('Hero async decoding missing');
          if ((banners.match(/cacheControl: '31536000'/g) || []).length < 2) throw new Error('Long cache missing');
          if (!assets.includes('optimizeImageBlob(sourceBlob')) throw new Error('Business public optimization missing');
          NODE
          git diff --check
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f performance-phase1-error.txt
          rm -f .github/workflows/performance-images-phase1-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src performance-phase1-error.txt .github/workflows/performance-images-phase1-final.yml
          git commit -m "perf(images): reduce initial media load and optimize uploads"
          git push origin HEAD:automation/performance-images-phase1-20260721
