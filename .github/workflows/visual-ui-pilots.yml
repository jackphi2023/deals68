name: Visual diff - UI pilots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/pages/Home.tsx'
      - 'src/pages/Businesses.tsx'
      - 'src/styles/**'
      - 'scripts/visual-diff-routes.mjs'
      - '.github/workflows/visual-ui-pilots.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/pages/Home.tsx'
      - 'src/pages/Businesses.tsx'
      - 'src/styles/**'
      - 'scripts/visual-diff-routes.mjs'
      - '.github/workflows/visual-ui-pilots.yml'

permissions:
  contents: write

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/investor-criteria-review-v1

      - name: Apply exact Admin prop fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pages/Admin.tsx')
          source = path.read_text()
          old = '<AssetEditor key={business.id} b={business} adminId={profile.id} onRefresh={load} />'
          new = '<AssetEditor key={business.id} business={business} adminId={profile.id} onRefresh={load} />'
          if old in source:
              path.write_text(source.replace(old, new, 1))
          elif new not in source:
              raise SystemExit('Expected AssetEditor call site was not found')
          PY
          if ! git diff --quiet -- src/pages/Admin.tsx; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add src/pages/Admin.tsx
            git commit -m "fix(admin): pass business prop to asset editor"
            git push origin HEAD:feature/investor-criteria-review-v1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build diagnostics
        run: |
          mkdir -p visual-diff
          set +e
          npm run build > visual-diff/pr3-build.log 2>&1
          code=$?
          echo "$code" > visual-diff/pr3-build-exit-code.txt
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-build-diagnostics
          path: |
            visual-diff/pr3-build.log
            visual-diff/pr3-build-exit-code.txt
          if-no-files-found: error

      - name: Stop when build failed
        run: test "$(cat visual-diff/pr3-build-exit-code.txt)" = "0"

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/deals68-preview.log 2>&1 &
          echo $! > /tmp/deals68-preview.pid
          sleep 5

      - name: Run visual diff pilots
        env:
          D68_TARGET_URL: http://127.0.0.1:4173
          D68_REFERENCE_URL: https://glittering-unicorn-afbf10.netlify.app
          D68_VISUAL_ROUTES: /,/businesses
          D68_VISUAL_THRESHOLD: '0.03'
        run: npm run visual:routes

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-ui-pilots
          path: visual-diff/
          if-no-files-found: warn

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/deals68-preview.pid ]; then kill $(cat /tmp/deals68-preview.pid) || true; fi
