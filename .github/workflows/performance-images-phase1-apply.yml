name: Apply performance images phase 1

on:
  push:
    branches:
      - automation/performance-images-phase1-20260721

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.head_commit.message == 'ci: apply performance image phase 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped image performance changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 occurrence, found {count}')
              p.write_text(text.replace(old, new, 1))

          optimization = r'''type ImageOptimizationOptions = {
            maxWidth: number;
            maxHeight: number;
            quality?: number;
            minBytes?: number;
          };

          const OPTIMIZABLE_IMAGE_TYPES = new Set([
            'image/jpeg',
            'image/png',
            'image/webp',
          ]);

          function webpName(name: string) {
            const clean = String(name || 'image').replace(/\.[^.]+$/, '');
            return `${clean || 'image'}.webp`;
          }

          function canvasBlob(
            canvas: HTMLCanvasElement,
            quality: number,
          ): Promise<Blob | null> {
            return new Promise((resolve) => {
              canvas.toBlob(resolve, 'image/webp', quality);
            });
          }

          export async function optimizeImageBlob(
            input: Blob,
            options: ImageOptimizationOptions,
          ): Promise<Blob> {
            const minBytes = Math.max(0, options.minBytes ?? 180_000);
            if (
              typeof window === 'undefined' ||
              typeof document === 'undefined' ||
              typeof createImageBitmap !== 'function' ||
              !OPTIMIZABLE_IMAGE_TYPES.has(input.type) ||
              input.size < minBytes
            ) {
              return input;
            }

            let bitmap: ImageBitmap | null = null;
            try {
              bitmap = await createImageBitmap(input);
              const scale = Math.min(
                1,
                options.maxWidth / bitmap.width,
                options.maxHeight / bitmap.height,
              );
              const width = Math.max(1, Math.round(bitmap.width * scale));
              const height = Math.max(1, Math.round(bitmap.height * scale));
              const canvas = document.createElement('canvas');
              canvas.width = width;
              canvas.height = height;
              const context = canvas.getContext('2d', { alpha: true });
              if (!context) return input;
              context.drawImage(bitmap, 0, 0, width, height);
              const output = await canvasBlob(
                canvas,
                Math.max(0.72, Math.min(0.95, options.quality ?? 0.88)),
              );
              if (!output || output.size >= input.size * 0.96) return input;
              return output;
            } catch {
              return input;
            } finally {
              bitmap?.close();
            }
          }

          export async function optimizeImageForUpload(
            file: File,
            options: ImageOptimizationOptions,
          ): Promise<File> {
            const optimized = await optimizeImageBlob(file, options);
            if (optimized === file) return file;
            return new File([optimized], webpName(file.name), {
              type: optimized.type || 'image/webp',
              lastModified: file.lastModified || Date.now(),
            });
          }
          '''
          Path('src/lib/imageUploadOptimization.ts').write_text(optimization)

          site_path = 'src/components/SiteBanners.tsx'
          replace_once(
              site_path,
              """  const activeBanner = rows[active] || null;
          const sliderClassName =
          """,
              """  useEffect(() => {
            if (rows.length <= 1 || typeof window === 'undefined') return undefined;
            const connection = (navigator as Navigator & {
              connection?: { saveData?: boolean; effectiveType?: string };
            }).connection;
            if (
              connection?.saveData ||
              connection?.effectiveType === 'slow-2g' ||
              connection?.effectiveType === '2g'
            ) {
              return undefined;
            }

            const next = rows[(active + 1) % rows.length];
            const mobile = window.matchMedia('(max-width: 700px)').matches;
            const nextUrl = cleanUrl(
              mobile ? next?.mobile_image_url || next?.image_url : next?.image_url,
            );
            if (!nextUrl) return undefined;

            const timer = window.setTimeout(() => {
              if (document.visibilityState !== 'visible') return;
              const image = new Image();
              image.decoding = 'async';
              image.fetchPriority = 'low';
              image.src = nextUrl;
            }, 3500);

            return () => window.clearTimeout(timer);
          }, [active, rows]);

          const activeBanner = rows[active] || null;
          const sliderClassName =
          """,
              'hero restrained preload',
          )
          replace_once(
              site_path,
              """      {rows.map((slide, index) => (
                <MaybeLink
                  key={slide.id}
                  href={slide.link_url}
                  ariaHidden={index !== active}
                  tabIndex={index === active ? undefined : -1}
                  className={
                    `d68-hero-slide${index === active ? ' is-active' : ''}`
                  }
                >
                  <HeroBannerMedia
                    banner={slide}
                    fallback={HERO_FALLBACK}
                    alt={slide.title || 'Deals68 banner'}
                    eager={index === 0}
                  />
                </MaybeLink>
              ))}
          """,
              """      {activeBanner ? (
                <MaybeLink
                  key={activeBanner.id}
                  href={activeBanner.link_url}
                  className="d68-hero-slide is-active"
                >
                  <HeroBannerMedia
                    banner={activeBanner}
                    fallback={HERO_FALLBACK}
                    alt={activeBanner.title || 'Deals68 banner'}
                    eager={active === 0}
                  />
                </MaybeLink>
              ) : null}
          """,
              'single active hero media',
          )

          hero_path = 'src/components/HeroBannerMedia.tsx'
          replace_once(
              hero_path,
              """        loading={eager ? 'eager' : 'lazy'}
                fetchPriority={eager ? 'high' : 'auto'}
                style={style}
          """,
              """        loading={eager ? 'eager' : 'lazy'}
                fetchPriority={eager ? 'high' : 'auto'}
                decoding="async"
                width={1600}
                height={600}
                style={style}
          """,
              'hero dimensions and decoding',
          )

          banners_path = 'src/lib/banners.ts'
          replace_once(
              banners_path,
              "import type { Lang } from './i18n';",
              "import type { Lang } from './i18n';\nimport { optimizeImageForUpload } from './imageUploadOptimization';",
              'banner optimizer import',
          )
          replace_once(
              banners_path,
              """  const safeName = file.name.replace(
              /[^a-zA-Z0-9._-]/g,
              '_',
            );
            const path = `${placement}/${variant}/${Date.now()}-${safeName}`;

            const { error: uploadError } = await supabase.storage
              .from('site-banners')
              .upload(path, file, {
                upsert: false,
                contentType: file.type || 'application/octet-stream',
                cacheControl: '3600',
              });
          """,
              """  const optimizedFile = await optimizeImageForUpload(file, {
              maxWidth: variant === 'mobile' ? 900 : 1920,
              maxHeight: variant === 'mobile' ? 1800 : 1200,
              quality: 0.9,
              minBytes: 180_000,
            });
            const safeName = optimizedFile.name.replace(
              /[^a-zA-Z0-9._-]/g,
              '_',
            );
            const path = `${placement}/${variant}/${Date.now()}-${safeName}`;

            const { error: uploadError } = await supabase.storage
              .from('site-banners')
              .upload(path, optimizedFile, {
                upsert: false,
                contentType: optimizedFile.type || 'application/octet-stream',
                cacheControl: '31536000',
              });
          """,
              'site banner optimized upload',
          )
          replace_once(
              banners_path,
              """  const safeInvestorId = String(investorId).replace(
              /[^a-zA-Z0-9_-]/g,
              '',
            );
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          """,
              """  const optimizedFile = await optimizeImageForUpload(file, {
              maxWidth: 1600,
              maxHeight: 900,
              quality: 0.88,
              minBytes: 180_000,
            });
            const safeInvestorId = String(investorId).replace(
              /[^a-zA-Z0-9_-]/g,
              '',
            );
            const safeName = optimizedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          """,
              'investor cover optimization',
          )
          replace_once(
              banners_path,
              """    .upload(path, file, {
                  upsert: false,
                  contentType: file.type,
                  cacheControl: '31536000',
                });
          """,
              """    .upload(path, optimizedFile, {
                  upsert: false,
                  contentType: optimizedFile.type,
                  cacheControl: '31536000',
                });
          """,
              'investor cover optimized upload body',
          )

          asset_path = 'src/lib/businessAssetStorage.ts'
          replace_once(
              asset_path,
              "import { supabase } from './supabase';",
              "import { supabase } from './supabase';\nimport { optimizeImageBlob } from './imageUploadOptimization';",
              'business image optimizer import',
          )
          replace_once(
              asset_path,
              "cacheControl: '3600',",
              "cacheControl: '31536000',",
              'business public immutable cache',
          )
          replace_once(
              asset_path,
              """  await uploadBlob(targetBucket, targetPath, sourceBlob, true);
          """,
              """  const uploadSource =
              targetBucket === BUSINESS_IMAGE_PUBLIC_BUCKET
                ? await optimizeImageBlob(sourceBlob, {
                    maxWidth: 1600,
                    maxHeight: 1200,
                    quality: 0.86,
                    minBytes: 220_000,
                  })
                : sourceBlob;

            await uploadBlob(targetBucket, targetPath, uploadSource, true);
          """,
              'business image optimize on approval',
          )

          replace_once(
              'src/pages/Home.tsx',
              '<img src={deal.image} alt={deal.title} loading="lazy" />',
              '<img src={deal.image} alt={deal.title} loading="lazy" decoding="async" fetchPriority="low" width={640} height={360} />',
              'home card image hints',
          )
          replace_once(
              'src/pages/Businesses.tsx',
              '<img src={d.image} alt={title} loading="lazy" />',
              '<img src={d.image} alt={title} loading="lazy" decoding="async" fetchPriority="low" width={640} height={360} />',
              'business listing image hints',
          )
          replace_once(
              'src/pages/BusinessDetail.tsx',
              '<img src={activeHero.url} alt={activeHero.title || title} />',
              '<img src={activeHero.url} alt={activeHero.title || title} loading="eager" fetchPriority="high" decoding="async" width={1600} height={900} />',
              'business detail hero hints',
          )
          replace_once(
              'src/pages/BusinessDetail.tsx',
              '<img src={img.url} alt={img.title || title} />',
              '<img src={img.url} alt={img.title || title} loading="lazy" fetchPriority="low" decoding="async" width={320} height={180} />',
              'business detail thumb hints',
          )
          replace_once(
              'src/pages/InvestorDetail.tsx',
              """                  <img
                            src={coverUrl}
                            alt={T(
          """,
              """                  <img
                            src={coverUrl}
                            loading="eager"
                            fetchPriority="high"
                            decoding="async"
                            width={1600}
                            height={560}
                            alt={T(
          """,
              'investor detail cover hints',
          )
          PY
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: CSS architecture QA
        run: npm run qa:css
      - name: Performance phase 1 contract checks
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const site = fs.readFileSync('src/components/SiteBanners.tsx', 'utf8');
          const hero = fs.readFileSync('src/components/HeroBannerMedia.tsx', 'utf8');
          const banners = fs.readFileSync('src/lib/banners.ts', 'utf8');
          const assets = fs.readFileSync('src/lib/businessAssetStorage.ts', 'utf8');
          if (site.includes('{rows.map((slide, index) => (')) throw new Error('All hero slides are still mounted');
          if (!site.includes('3500')) throw new Error('Restrained next-slide preload missing');
          if (!hero.includes('decoding="async"')) throw new Error('Hero async decoding missing');
          if ((banners.match(/cacheControl: '31536000'/g) || []).length < 2) throw new Error('Long banner cache missing');
          if (!assets.includes('optimizeImageBlob(sourceBlob')) throw new Error('Business image approval optimization missing');
          if (!fs.existsSync('src/lib/imageUploadOptimization.ts')) throw new Error('Image optimizer missing');
          NODE
          git diff --check
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .github/workflows/performance-images-phase1-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/workflows/performance-images-phase1-apply.yml
          git commit -m "perf(images): reduce initial media load and optimize uploads"
          git push origin HEAD:automation/performance-images-phase1-20260721
