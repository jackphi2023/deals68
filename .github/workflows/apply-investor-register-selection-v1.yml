name: Apply investor registration selection v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Fix package JSX expression in patch runner
        run: python3 scripts/fix-investor-register-patch-runner-v1.py

      - name: Apply scoped patch
        run: python3 scripts/apply-investor-register-selection-v1.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: npm run build > /tmp/investor-register-build.log 2>&1

      - name: Upload build diagnostic
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: investor-register-build-diagnostic
          path: /tmp/investor-register-build.log
          retention-days: 1

      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/investor-register-build.log
          exit 1

      - name: Commit to building and remove one-time files
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          rm -f scripts/apply-investor-register-selection-v1.py
          rm -f scripts/fix-investor-register-patch-runner-v1.py
          rm -f .github/workflows/apply-investor-register-selection-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(register): require investor criteria choices and simplify payment"
          git push origin HEAD:building
