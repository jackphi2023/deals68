name: Apply investor registration selection v1

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Fix package JSX expression in patch runner
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-investor-register-selection-v1.py')
          text = path.read_text(encoding='utf-8')
          old = '''replacement = (
    '      {isBusiness ? (\n'
    '        <div className="d68-bizreg-options">\n'
    f'{business_body}'
    '        </div>\n'
    '      ) : null}\n'
)'''
          new = '''replacement = (
    '      {isBusiness ? (\n'
    '        <div className="d68-bizreg-options">\n'
    '          {\n'
    f'{business_body}'
    '          }\n'
    '        </div>\n'
    '      ) : null}\n'
)'''
          if text.count(old) != 1:
              raise SystemExit('Could not patch package JSX expression')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply scoped patch
        run: python3 scripts/apply-investor-register-selection-v1.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: npm run build > /tmp/investor-register-build.log 2>&1

      - name: Upload build diagnostic
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: investor-register-build-diagnostic
          path: /tmp/investor-register-build.log
          retention-days: 1

      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/investor-register-build.log
          exit 1

      - name: Commit to building and remove one-time files
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          rm -f scripts/apply-investor-register-selection-v1.py
          rm -f .github/workflows/apply-investor-register-selection-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(register): require investor criteria choices and simplify payment"
          git push origin HEAD:building
