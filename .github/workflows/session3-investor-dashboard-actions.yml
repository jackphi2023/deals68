name: Session 3 Investor Dashboard Actions

on:
  pull_request:
    branches:
      - building

permissions:
  contents: write

jobs:
  apply-build-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Apply exact Investor Dashboard changes
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('src/pages/InvestorDashboard.tsx')
          source = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """          <Link
            className=\"d68-dashboard-btn light\"
            to={toLocalizedPath(`/businesses/${business.slug}`, lang)}
          >
            {T(lang, 'Xem doanh nghiệp', 'View business')}
          </Link>
""",
                  """""",
              ),
              (
                  """function InterestRows({ lang, rows }: { lang: Lang; rows: any[] }) {""",
                  """function InterestRows({
  lang,
  rows,
  onRequest,
}: {
  lang: Lang;
  rows: any[];
  onRequest: (business: any) => void;
}) {""",
              ),
              (
                  """            {business.slug ? (
              <Link
                className=\"d68-dashboard-btn light\"
                to={toLocalizedPath(`/businesses/${business.slug}`, lang)}
              >
                {T(lang, 'Xem chi tiết', 'View details')}
              </Link>
            ) : null}""",
                  """            {business.id ? (
              <button
                type=\"button\"
                className=\"d68-dashboard-btn gold\"
                onClick={() => onRequest(business)}
              >
                {T(lang, 'Yêu cầu tài liệu', 'Request documents')}
              </button>
            ) : null}""",
              ),
              (
                  """              {business.slug ? (
                <Link
                  to={toLocalizedPath(`/businesses/${business.slug}`, lang)}
                  className=\"d68-dashboard-btn light\"
                >
                  {T(lang, 'Xem hồ sơ doanh nghiệp', 'View business profile')}
                </Link>
              ) : null}
""",
                  """""",
              ),
              (
                  """                <InterestRows lang={lang} rows={interests} />""",
                  """                <InterestRows
                  lang={lang}
                  rows={interests}
                  onRequest={requestData}
                />""",
              ),
          ]

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(
                      f'Expected exactly one match, found {count}: {old[:100]!r}'
                  )
              source = source.replace(old, new, 1)

          path.write_text(source, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Validate Session 3 contract
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync('src/pages/InvestorDashboard.tsx', 'utf8');

          const required = [
            'onRequest: (business: any) => void;',
            "{T(lang, 'Yêu cầu tài liệu', 'Request documents')}",
            'className="d68-dashboard-btn gold"',
            'onClick={() => onRequest(business)}',
            'onRequest={requestData}',
            '<BusinessTitleLink business={business} lang={lang}>',
            "{T(lang, 'Yêu cầu tài liệu', 'Request data')}",
          ];
          for (const token of required) {
            if (!source.includes(token)) throw new Error(`Missing Session 3 token: ${token}`);
          }

          const forbidden = [
            "{T(lang, 'Xem doanh nghiệp', 'View business')}",
            "{T(lang, 'Xem chi tiết', 'View details')}",
            "{T(lang, 'Xem hồ sơ doanh nghiệp', 'View business profile')}",
          ];
          for (const token of forbidden) {
            if (source.includes(token)) throw new Error(`Forbidden Session 3 token remains: ${token}`);
          }

          const interestFunction = source.slice(
            source.indexOf('function InterestRows'),
            source.indexOf('function ProposalRows'),
          );
          if (!interestFunction.includes('onRequest(business)')) {
            throw new Error('Saved-business request action is not wired to requestData.');
          }

          console.log('Session 3 Investor Dashboard contract: PASS');
          NODE

      - name: Commit product-only diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/session3-investor-dashboard-actions.yml
          git add src/pages/InvestorDashboard.tsx
          git commit -m "fix: simplify Investor Dashboard business actions"
          git push origin HEAD:${{ github.head_ref }}
