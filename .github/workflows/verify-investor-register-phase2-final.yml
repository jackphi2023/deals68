name: Verify Investor Registration Phase 2 Final

on:
  push:
    branches:
      - feature/investor-register-plans-phase2-20260723

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Investor registration contract
        run: npm run qa:investor-register-plans

      - name: Investor entitlement regression
        run: npm run qa:investor-plans

      - name: Migration state contract
        run: npm run qa:migrations

      - name: Production build
        run: npm run build

      - name: CSS architecture regression
        run: npm run qa:css

      - name: Route regression
        run: npm run check:routes

      - name: Diff formatting
        run: git diff --check

      - name: Remove one-time workflow
        run: |
          rm -f .github/workflows/verify-investor-register-phase2-final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: finalize Investor registration Phase 2 QA"
          git push origin HEAD:${GITHUB_REF_NAME}
