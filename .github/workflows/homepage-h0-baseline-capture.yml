name: Homepage H0 baseline capture

on:
  push:
    branches:
      - chore/homepage-h0-baseline-final
    paths:
      - .github/workflows/homepage-h0-baseline-capture.yml
      - scripts/homepage-h0-trigger.txt

permissions:
  contents: write

jobs:
  capture:
    if: contains(github.event.head_commit.message, '[h0 baseline]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: https://h0-baseline.supabase.co
      VITE_SUPABASE_ANON_KEY: h0-public-anon-key
      D68_BASE_URL: http://127.0.0.1:5173
      D68_USE_LOCAL_SERVER: '1'
    steps:
      - name: Checkout H0 branch
        uses: actions/checkout@v4
        with:
          ref: chore/homepage-h0-baseline-final
          fetch-depth: 0
          show-progress: false

      - name: Normalize deterministic H0 test harness
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/e2e/06-homepage-h0-baseline.spec.ts')
          text = path.read_text(encoding='utf-8')

          priority_old = 'admin_priority: index < 2,'
          priority_new = 'admin_priority: false,'
          if priority_old not in text and priority_new not in text:
              raise SystemExit('Expected H0 Investor fixture token was not found')
          text = text.replace(priority_old, priority_new)

          wait_old = '''  await page.evaluate(async () => {
            await (document as Document & { fonts?: FontFaceSet }).fonts?.ready;
            const images = Array.from(document.images);
            await Promise.all(
              images.map((image) =>
                image.complete
                  ? Promise.resolve()
                  : new Promise<void>((resolve) => {
                      image.addEventListener('load', () => resolve(), { once: true });
                      image.addEventListener('error', () => resolve(), { once: true });
                    }),
              ),
            );
          });'''
          wait_new = '  await page.waitForTimeout(300);'
          if wait_old not in text and wait_new not in text:
              raise SystemExit('Expected unbounded image wait block was not found')
          text = text.replace(wait_old, wait_new)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen Homepage source
        run: node scripts/deals68-homepage-h0-baseline-check.mjs

      - name: Production build with isolated H0 environment
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture local Homepage baseline
        id: browser_capture
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p docs/qa/homepage-h0-baseline
          set +e
          npx playwright test \
            tests/e2e/06-homepage-h0-baseline.spec.ts \
            --config=playwright.config.ts \
            --project=chromium-1440 \
            2>&1 | tee docs/qa/homepage-h0-baseline/playwright-output.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Validate generated evidence
        if: steps.browser_capture.outcome == 'success'
        run: |
          test -f docs/qa/homepage-h0-baseline/source-manifest.json
          test -f docs/qa/homepage-h0-baseline/computed-styles.json
          test -f docs/qa/homepage-h0-baseline/home-vi-1440x900.png
          test -f docs/qa/homepage-h0-baseline/home-vi-1280x800.png
          test -f docs/qa/homepage-h0-baseline/home-vi-768x1024.png
          test -f docs/qa/homepage-h0-baseline/home-vi-390x844.png
          test -f docs/qa/homepage-h0-baseline/home-vi-375x812.png
          test -f docs/qa/homepage-h0-baseline/home-en-1440x900.png
          git diff --check

      - name: Commit H0 evidence and deterministic fixture to feature branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/qa/homepage-h0-baseline tests/e2e/06-homepage-h0-baseline.spec.ts
          if git diff --cached --quiet; then
            echo "No generated H0 evidence to commit."
            exit 0
          fi
          git commit -m "test(home): record H0 visual and computed-style baseline"
          git push origin HEAD:chore/homepage-h0-baseline-final

      - name: Enforce successful browser capture
        if: always()
        run: |
          test "${{ steps.browser_capture.outputs.status }}" = "0"

# One-time H0 evidence workflow; removed before merge into building.
