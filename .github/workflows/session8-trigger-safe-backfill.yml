name: Session 8 Trigger-safe Backfill QA

on:
  push:
    branches:
      - qa/session8-final-regression-cleanup-v1
    paths:
      - .github/workflows/session8-trigger-safe-backfill.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Session 8 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: qa/session8-final-regression-cleanup-v1

      - name: Make approved snapshot backfill trigger-safe
        run: |
          python <<'PY'
          from pathlib import Path

          migration_path = Path('supabase/migrations/20260717215300_business_public_financial_snapshot_v1.sql')
          source = migration_path.read_text(encoding='utf-8')
          disable = "alter table public.businesses disable trigger trg_refresh_quality_businesses;\n\n"
          enable = "\nalter table public.businesses enable trigger trg_refresh_quality_businesses;\n"
          backfill = "-- Backfill only previously approved public snapshots"
          view = "\ncreate or replace view public.public_businesses_safe"

          if disable not in source:
              if source.count(backfill) != 1:
                  raise SystemExit('Could not locate approved snapshot backfill')
              source = source.replace(backfill, disable + backfill, 1)
          if enable not in source:
              if source.count(view) != 1:
                  raise SystemExit('Could not locate safe view recreation')
              source = source.replace(view, enable + view, 1)
          migration_path.write_text(source, encoding='utf-8')

          check_path = Path('scripts/deals68-session8-final-regression-check.mjs')
          check = check_path.read_text(encoding='utf-8')
          anchor = "  'revoke all on function public.approve_business_pending_changes',\n"
          additions = (
              "  'alter table public.businesses disable trigger trg_refresh_quality_businesses',\n"
              "  'alter table public.businesses enable trigger trg_refresh_quality_businesses',\n"
          )
          if additions not in check:
              if check.count(anchor) != 1:
                  raise SystemExit('Could not extend Session 8 migration contract')
              check = check.replace(anchor, anchor + additions, 1)
              check_path.write_text(check, encoding='utf-8')
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Session 8 regression contract
        run: node scripts/deals68-session8-final-regression-check.mjs

      - name: Release QA
        run: npm run qa:release

      - name: Independent production build
        run: npm run build

      - name: Diff check
        run: |
          git diff --check
          git diff --check origin/building...HEAD

      - name: Commit clean trigger-safe migration change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/session8-trigger-safe-backfill.yml
          git add supabase/migrations/20260717215300_business_public_financial_snapshot_v1.sql scripts/deals68-session8-final-regression-check.mjs
          git diff --cached --check
          git commit -m "fix: make approved Business snapshot backfill trigger-safe"
          git push origin HEAD:qa/session8-final-regression-cleanup-v1
