name: Final QA performance phase 2

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: read

jobs:
  final-qa:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build
        run: npm run build
      - name: Package regression QA
        run: npm run qa:packages
      - name: Confirm release static failure is pre-existing and unchanged
        shell: bash
        run: |
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/current-release.log 2>&1
          current_status=$?
          set -e

          git worktree add /tmp/phase2-baseline e071cd635d36099c35d90788afbf8298e1558d3a
          cd /tmp/phase2-baseline
          npm ci >/dev/null
          npm run build >/dev/null
          set +e
          node scripts/deals68-release-qa-check.mjs > /tmp/baseline-release.log 2>&1
          baseline_status=$?
          set -e

          test "$current_status" = "$baseline_status"
          grep '^✗ ' /tmp/current-release.log > /tmp/current-failures.txt || true
          grep '^✗ ' /tmp/baseline-release.log > /tmp/baseline-failures.txt || true
          diff -u /tmp/baseline-failures.txt /tmp/current-failures.txt
          grep -q 'business industry links and filters use canonical taxonomy keys' /tmp/current-failures.txt
          echo 'Current and baseline release static checks have the same single unrelated failure.'
