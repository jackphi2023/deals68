name: Capture final performance patch error

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: write

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'automation/performance-images-phase1-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-images-phase1-20260721
          fetch-depth: 2
      - name: Run patch and store exact error
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/performance-images-phase1-final.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(source) if "python3 <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/phase1.py').write_text(script)
          PY
          set +e
          python3 /tmp/phase1.py > performance-phase1-error.txt 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then echo "patch unexpectedly passed" > performance-phase1-error.txt; fi
          rm -f .github/workflows/performance-images-phase1-final.yml
          rm -f .github/workflows/performance-images-phase1-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add performance-phase1-error.txt .github/workflows/performance-images-phase1-final.yml .github/workflows/performance-images-phase1-diagnostic.yml
          git commit -m "ci: capture final performance patch diagnostics"
          git push origin HEAD:automation/performance-images-phase1-20260721
