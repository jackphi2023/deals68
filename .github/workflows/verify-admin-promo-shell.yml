name: Verify admin promo shell

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Apply Admin promo shell refactor
        run: python3 scripts/apply-admin-promo-shell.py

      - name: Verify architecture contracts
        shell: bash
        run: |
          grep -q 'ADMIN_NAV_SECTIONS' src/pages/Admin.tsx
          grep -q 'AdminPromoManager' src/pages/Admin.tsx
          grep -q 'adminTabUsesGlobalSearch(tab)' src/pages/Admin.tsx
          ! grep -q 'function Promos(' src/pages/Admin.tsx
          ! grep -q 'AdminPromos' src/App.tsx
          test ! -f src/pages/AdminPromos.tsx
          grep -q 'path="/admin/promo" element={<Admin/>}' src/App.tsx
          grep -q 'path="/admin/promos" element={<Admin/>}' src/App.tsx

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Commit verified source changes
        shell: bash
        run: |
          rm -f scripts/apply-admin-promo-shell.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "refactor(admin): integrate promo manager into admin shell"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
