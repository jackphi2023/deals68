name: Apply related investor wording

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: deals68-related-investor-wording
  cancel-in-progress: false

jobs:
  apply-verify-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply wording-only change
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/components/investor/RelatedInvestorsSection.tsx')
          text = path.read_text(encoding='utf-8')

          old_import = "import { labelCountry, labelIndustry, T } from '../../lib/labels';"
          new_import = "import { labelCountry, T } from '../../lib/labels';"
          if text.count(old_import) != 1:
              raise SystemExit('Expected label import was not found exactly once')
          text = text.replace(old_import, new_import, 1)

          old_header = """            <h2 id=\"related-investors-title\">\n              {T(lang, 'Nhà đầu tư cùng danh mục', 'Investors in the same category')}\n            </h2>\n            {category ? (\n              <p>{labelIndustry(category, lang)}</p>\n            ) : null}\n"""
          new_header = """            <h2 id=\"related-investors-title\">\n              {T(lang, 'Nhà đầu tư tương tự', 'Similar investors')}\n            </h2>\n"""
          if text.count(old_header) != 1:
              raise SystemExit('Expected related-investor header was not found exactly once')
          text = text.replace(old_header, new_header, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify file scope
        run: |
          unexpected=$(git status --short | awk '{print $2}' | grep -Ev '^(src/components/investor/RelatedInvestorsSection.tsx|.github/workflows/apply-related-investor-wording.yml)$' || true)
          if [ -n "$unexpected" ]; then
            echo 'Unexpected files changed:'
            echo "$unexpected"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Diff validation
        run: git diff --check

      - name: Remove temporary workflow
        run: git rm .github/workflows/apply-related-investor-wording.yml

      - name: Commit wording-only change to building
        run: |
          git config user.name "Deals68 Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "copy(investor): rename related investors section"
          git push origin HEAD:building
