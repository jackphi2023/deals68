name: Apply Business Detail transaction stacked layout

on:
  push:
    branches:
      - building
    paths:
      - .github/workflows/apply-business-detail-transaction-stack.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Apply scoped CSS change
        run: python3 scripts/apply-business-detail-transaction-stack.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit verified CSS and remove temporary files
        shell: bash
        run: |
          rm -f scripts/apply-business-detail-transaction-stack.py
          rm -f .github/workflows/apply-business-detail-transaction-stack.yml
          rm -f docs/.business-detail-transaction-layout-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(business): stack transaction detail content below labels"
          git push origin HEAD:building
