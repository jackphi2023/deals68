name: Business Report Phase 5 QA

on:
  push:
    branches: [main, building]
    paths:
      - 'src/features/businessReports/**'
      - 'supabase/functions/business-ai-report/**'
      - 'supabase/migrations/20260721114500_ai_report_phase5_worker_artifact_v1.sql'
      - 'scripts/deals68-business-report-phase5-check.mjs'
      - 'scripts/deals68-business-report-ui-check.mjs'
      - 'scripts/deals68-migration-state-check.mjs'
      - 'docs/release/MIGRATION_STATE.md'
      - 'package.json'
      - '.github/workflows/business-report-phase5-qa.yml'
  pull_request:
    branches: [main, building]
    paths:
      - 'src/features/businessReports/**'
      - 'supabase/functions/business-ai-report/**'
      - 'supabase/migrations/20260721114500_ai_report_phase5_worker_artifact_v1.sql'
      - 'scripts/deals68-business-report-phase5-check.mjs'
      - 'scripts/deals68-business-report-ui-check.mjs'
      - 'scripts/deals68-migration-state-check.mjs'
      - 'docs/release/MIGRATION_STATE.md'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: business-report-phase5-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - name: Production frontend build
        run: npm run build
      - name: Phase 5 contract
        run: npm run qa:business-report-phase5
      - name: Edge Function type and format checks
        run: |
          deno fmt --check supabase/functions/business-ai-report
          deno check --config supabase/functions/business-ai-report/deno.json supabase/functions/business-ai-report/index.ts
      - name: Report and core regression contracts
        run: |
          npm run qa:business-report-ui
          npm run qa:admin-reports
          npm run qa:migrations
          npm run qa:css
          npm run check:routes
          git diff --check
