name: Reconcile Investor Plan Migration Ledger

on:
  push:
    branches:
      - feature/investor-plan-entitlements-phase1-20260723

permissions:
  contents: write

jobs:
  reconcile-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reconcile source filename to applied Supabase ledger
        run: node scripts/reconcile-investor-plan-migration-ledger.mjs

      - name: Install dependencies
        run: npm ci

      - name: Investor plan entitlement contract
        run: npm run qa:investor-plans

      - name: Migration state contract
        run: npm run qa:migrations

      - name: Production build
        run: npm run build

      - name: CSS architecture regression
        run: npm run qa:css

      - name: Diff formatting
        run: git diff --check

      - name: Commit ledger-aligned verified source
        run: |
          rm -f scripts/reconcile-investor-plan-migration-ledger.mjs
          rm -f .github/workflows/reconcile-investor-plan-migration-ledger.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: align Investor plan migration with Supabase ledger"
          git push origin HEAD:${GITHUB_REF_NAME}
