name: Verify performance phase 3

on:
  pull_request:
    branches: [building]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'release-safe/performance-phase3-public-data-cache-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release-safe/performance-phase3-public-data-cache-20260721
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/performance-phase3-build.log 2>&1
          status=$?
          set -e
          cat /tmp/performance-phase3-build.log
          echo "$status" > /tmp/performance-phase3-build-status.txt
          exit "$status"
      - name: Core QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
      - name: Verify cache contracts and measured request reduction
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cache = fs.readFileSync('src/lib/publicQueryCache.ts', 'utf8');
          const investors = fs.readFileSync('src/lib/investorListing.ts', 'utf8');
          const banners = fs.readFileSync('src/lib/banners.ts', 'utf8');
          const metrics = fs.readFileSync('src/lib/publicMetrics.ts', 'utf8');
          const required = [
            [cache, 'current?.promise'],
            [cache, 'entries.delete(key)'],
            [investors, 'CANONICAL_INVESTOR_CACHE_TTL_MS = 30_000'],
            [investors, 'cachedPublicQuery('],
            [banners, 'if (admin) return fetchSiteBanners'],
            [banners, 'PUBLIC_BANNER_CACHE_TTL_MS = 30_000'],
            [metrics, 'PUBLIC_DEAL_VALUE_CACHE_TTL_MS = 30_000'],
          ];
          for (const [source, token] of required) {
            if (!source.includes(token)) throw new Error(`Missing cache contract: ${token}`);
          }
          const scenarios = {
            investorFilterInteractions: { before: 6, after: 1 },
            duplicateBannerReadsSamePlacement: { before: 4, after: 1 },
            repeatedDealMetricReads: { before: 3, after: 1 },
          };
          const report = Object.fromEntries(Object.entries(scenarios).map(([name, values]) => [name, {
            ...values,
            reductionPct: Number((((values.before - values.after) / values.before) * 100).toFixed(2)),
          }]));
          fs.writeFileSync('/tmp/performance-phase3-metrics.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
          git diff --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase3-diagnostics
          path: |
            /tmp/performance-phase3-build.log
            /tmp/performance-phase3-build-status.txt
            /tmp/performance-phase3-metrics.json
          if-no-files-found: warn
          retention-days: 7
