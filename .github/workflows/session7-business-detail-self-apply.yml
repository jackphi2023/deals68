name: Session 7 Business Detail Self Apply

# Synchronize trigger after workflow registration.
on:
  push:
    branches:
      - automation/session7-business-detail-runner-v3
    paths:
      - .github/workflows/session7-business-detail-self-apply.yml

permissions:
  contents: write

jobs:
  apply-build-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Session 7 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: automation/session7-business-detail-runner-v3

      - name: Apply Session 7 Business Detail changes
        run: python scripts/session7-business-detail-apply.py

      - name: Install dependencies
        run: npm ci

      - name: Session 7 contract
        run: node scripts/deals68-business-detail-assets-transaction-check.mjs

      - name: Full package checks
        run: npm run qa:packages

      - name: Production build
        run: npm run build

      - name: Commit clean Session 7 product diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/session7-business-detail-self-apply.yml
          git rm scripts/session7-business-detail-apply.py
          git add src/pages/BusinessDetail.tsx src/styles/pages/business-detail.css scripts/deals68-business-detail-assets-transaction-check.mjs scripts/deals68-package-checks.mjs
          git diff --cached --check
          git commit -m "fix: show approved Business assets and transaction details"
          git push origin HEAD:automation/session7-business-detail-runner-v3
