name: Finalize About CSS cleanup

on:
  pull_request:
    branches:
      - building
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout building
        uses: actions/checkout@v4
        with:
          ref: building
          fetch-depth: 1
          show-progress: false

      - name: Remove remaining legacy About rules
        run: python3 scripts/finalize-about-css-clean.py

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Commit verified CSS cleanup
        shell: bash
        run: |
          rm -f scripts/finalize-about-css-clean.py
          rm -f .github/workflows/finalize-about-css-clean.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(about): remove remaining legacy CSS conflict"
          git push origin HEAD:building
