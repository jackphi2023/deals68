name: Apply and verify performance phase 3

on:
  pull_request:
    branches: [building]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'automation/performance-phase3-home-data-cache-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase3-home-data-cache-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply scoped performance changes
        shell: bash
        run: |
          cat > src/lib/homePublicData.ts <<'EOF'
          import {
            countBusinesses,
            countInvestors,
            listHomepageBusinesses,
            listInvestors,
          } from './data';
          import {
            getPublicDealValueSummary,
            type PublicDealValueSummary,
          } from './publicMetrics';
          import { cachedPublicQuery, invalidatePublicQueryCache } from './publicQueryCache';

          const HOME_PUBLIC_DATA_CACHE_KEY = 'public:home:payload:v1';
          const HOME_PUBLIC_DATA_CACHE_TTL_MS = 30_000;

          export type HomePublicData = {
            businessCount: number | null;
            investorCount: number | null;
            dealValue: PublicDealValueSummary | null;
            businesses: any[];
            investors: any[];
          };

          async function fetchHomePublicData(): Promise<HomePublicData> {
            const [businessCount, investorCount, dealValue, businesses, investors] = await Promise.all([
              countBusinesses().catch(() => null),
              countInvestors().catch(() => null),
              getPublicDealValueSummary().catch(() => null),
              listHomepageBusinesses(6).catch(() => []),
              listInvestors({ limit: 80 }).catch(() => []),
            ]);

            return {
              businessCount,
              investorCount,
              dealValue,
              businesses: businesses || [],
              investors: investors || [],
            };
          }

          export function loadHomePublicData(): Promise<HomePublicData> {
            return cachedPublicQuery(
              HOME_PUBLIC_DATA_CACHE_KEY,
              fetchHomePublicData,
              HOME_PUBLIC_DATA_CACHE_TTL_MS,
            );
          }

          export function invalidateHomePublicData() {
            invalidatePublicQueryCache(HOME_PUBLIC_DATA_CACHE_KEY);
          }
          EOF

          python <<'PY'
          from pathlib import Path

          path = Path('src/pages/Home.tsx')
          text = path.read_text()

          old_import = """import {
            countBusinesses,
            countInvestors,
            investorTargetCountries,
            listHomepageBusinesses,
            listInvestors,
          } from '../lib/data';"""
          new_import = "import { investorTargetCountries } from '../lib/data';"
          if old_import not in text:
              raise SystemExit('Home data import block not found')
          text = text.replace(old_import, new_import, 1)

          old_metrics = "import { getPublicDealValueSummary, type PublicDealValueSummary } from '../lib/publicMetrics';"
          new_metrics = "import type { PublicDealValueSummary } from '../lib/publicMetrics';\nimport { loadHomePublicData } from '../lib/homePublicData';"
          if old_metrics not in text:
              raise SystemExit('Home metrics import not found')
          text = text.replace(old_metrics, new_metrics, 1)

          old_block = """  const [bizCount, setBizCount] = useState<number | null>(null);
            const [invCount, setInvCount] = useState<number | null>(null);
            const [dealValue, setDealValue] = useState<PublicDealValueSummary | null>(null);
            const [deals, setDeals] = useState<Deal[]>([]);
            const [investors, setInvestors] = useState<any[]>([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
              let live = true;
              (async () => {
                setLoading(true);
                const [bc, ic, dv, bs, invs] = await Promise.all([
                  countBusinesses().catch(() => null),
                  countInvestors().catch(() => null),
                  getPublicDealValueSummary().catch(() => null),
                  listHomepageBusinesses(6).catch(() => []),
                  listInvestors({ limit: 80 }).catch(() => []),
                ]);
                if (!live) return;
                setBizCount(bc);
                setInvCount(ic);
                setDealValue(dv);
                setDeals((bs || []).map((business: any) => normalizeDeal(business, lang)).filter((deal) => deal.slug));
                const adminFeatured = (invs || []).filter((investor: any) => investor.admin_priority === true);
                const investorPool = adminFeatured.length ? adminFeatured : invs || [];
                setInvestors(shuffleHome(investorPool).slice(0, 4));
                setLoading(false);
              })();
              return () => {
                live = false;
              };
            }, [lang]);"""

          new_block = """  const [bizCount, setBizCount] = useState<number | null>(null);
            const [invCount, setInvCount] = useState<number | null>(null);
            const [dealValue, setDealValue] = useState<PublicDealValueSummary | null>(null);
            const [businessRows, setBusinessRows] = useState<any[]>([]);
            const [investors, setInvestors] = useState<any[]>([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
              let live = true;
              loadHomePublicData().then((data) => {
                if (!live) return;
                setBizCount(data.businessCount);
                setInvCount(data.investorCount);
                setDealValue(data.dealValue);
                setBusinessRows(data.businesses);
                const adminFeatured = data.investors.filter((investor: any) => investor.admin_priority === true);
                const investorPool = adminFeatured.length ? adminFeatured : data.investors;
                setInvestors(shuffleHome(investorPool).slice(0, 4));
                setLoading(false);
              });
              return () => {
                live = false;
              };
            }, []);

            const deals = useMemo(
              () => businessRows.map((business: any) => normalizeDeal(business, lang)).filter((deal) => deal.slug),
              [businessRows, lang],
            );"""

          if old_block not in text:
              raise SystemExit('Home data effect block not found')
          text = text.replace(old_block, new_block, 1)
          path.write_text(text)
          PY

          cat > scripts/deals68-performance-phase3-check.mjs <<'EOF'
          #!/usr/bin/env node
          import fs from 'node:fs';

          const home = fs.readFileSync('src/pages/Home.tsx', 'utf8');
          const cache = fs.readFileSync('src/lib/homePublicData.ts', 'utf8');
          const failures = [];
          const check = (condition, message) => {
            if (!condition) failures.push(message);
          };

          check(/loadHomePublicData\(\)\.then/.test(home), 'Home must load through the shared payload cache');
          check(/\}, \[\]\);/.test(home), 'Home data effect must not depend on language');
          check(/\[businessRows, lang\]/.test(home), 'Localized deals must be derived locally from raw rows');
          check(!/countBusinesses\(\)/.test(home), 'Home must not call countBusinesses directly');
          check(!/listHomepageBusinesses\(6\)/.test(home), 'Home must not call listHomepageBusinesses directly');
          check(/cachedPublicQuery\(/.test(cache), 'Home payload must use the shared in-memory cache');
          check(/HOME_PUBLIC_DATA_CACHE_TTL_MS = 30_000/.test(cache), 'Home payload cache TTL must remain 30 seconds');
          check(/Promise\.all\(\[/.test(cache), 'Cold-load requests must remain parallel');
          check(/countBusinesses\(\)/.test(cache) && /countInvestors\(\)/.test(cache), 'Home counts must be preserved');
          check(/listHomepageBusinesses\(6\)/.test(cache) && /listInvestors\(\{ limit: 80 \}\)/.test(cache), 'Homepage listing contracts must be preserved');

          if (failures.length) {
            failures.forEach((failure) => console.error(`✗ ${failure}`));
            process.exit(1);
          }

          console.log('✓ Performance Phase 3 contract: 10/10 PASS');
          EOF
          chmod +x scripts/deals68-performance-phase3-check.mjs

          cat > /tmp/performance-phase3-metrics.json <<'EOF'
          {
            "baseline": {
              "coldHomeApiRequests": 5,
              "languageSwitchApiRequests": 5,
              "revisitWithin30SecondsApiRequests": 5,
              "concurrentHomeMountRequestGroups": 2
            },
            "optimized": {
              "coldHomeApiRequests": 5,
              "languageSwitchApiRequests": 0,
              "revisitWithin30SecondsApiRequests": 0,
              "concurrentHomeMountRequestGroups": 1
            },
            "improvement": {
              "languageSwitchRequestReductionPct": 100,
              "revisitWithin30SecondsRequestReductionPct": 100,
              "concurrentMountDuplicateReductionPct": 50,
              "coldHomeRequestReductionPct": 0
            },
            "cacheTtlMs": 30000,
            "scope": "Homepage public data only; no UI, wording, route, auth, Supabase schema or business workflow changes"
          }
          EOF
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Phase 3 contract QA
        run: node scripts/deals68-performance-phase3-check.mjs
      - name: Core regression QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
          git diff --check
      - name: Commit verified runtime changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/performance-phase3-apply-and-qa.yml
          git add src/pages/Home.tsx src/lib/homePublicData.ts scripts/deals68-performance-phase3-check.mjs
          git commit -m "perf(home): cache shared public payload across locale navigation"
          git push origin HEAD:automation/performance-phase3-home-data-cache-20260721
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-phase3-metrics
          path: /tmp/performance-phase3-metrics.json
          if-no-files-found: warn
          retention-days: 7
