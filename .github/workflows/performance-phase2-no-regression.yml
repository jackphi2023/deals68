name: Verify no regressions performance phase 2

on:
  pull_request:
    branches: [building]
    types: [synchronize]

permissions:
  contents: read

jobs:
  no-regression:
    if: github.event.pull_request.head.ref == 'automation/performance-phase2-route-split-20260721'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/performance-phase2-route-split-20260721
          fetch-depth: 30
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build
        run: npm run build
      - name: Core QA
        run: |
          npm run qa:css
          npm run qa:migrations
          npm run check:routes
      - name: Compare all package checks with baseline
        shell: bash
        run: |
          cat > /tmp/compare-package-checks.cjs <<'NODE'
          const { spawnSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          function failures(root) {
            const source = fs.readFileSync(path.join(root, 'scripts/deals68-package-checks.mjs'), 'utf8');
            const scripts = [...source.matchAll(/'([^']+\.mjs)'/g)].map((m) => m[1]);
            return scripts.filter((script) => {
              const result = spawnSync(process.execPath, [script], { cwd: root, stdio: 'ignore' });
              return (result.status ?? 1) !== 0;
            });
          }
          const current = failures(process.argv[2]);
          const baseline = failures(process.argv[3]);
          const newFailures = current.filter((script) => !baseline.includes(script));
          console.log(JSON.stringify({ current, baseline, newFailures }, null, 2));
          if (newFailures.length) process.exit(1);
          NODE
          git worktree add /tmp/phase2-baseline e071cd635d36099c35d90788afbf8298e1558d3a
          node /tmp/compare-package-checks.cjs "$GITHUB_WORKSPACE" /tmp/phase2-baseline
      - name: Verify route split contracts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const app = fs.readFileSync('src/App.tsx', 'utf8');
          const vite = fs.readFileSync('vite.config.ts', 'utf8');
          const eagerPages = [...app.matchAll(/^import .* from '\.\/pages\/(.+)';$/gm)].map((m) => m[1]);
          if (eagerPages.join(',') !== 'Home') throw new Error(`Unexpected eager pages: ${eagerPages.join(',')}`);
          if (!app.includes('requestIdleCallback') || !app.includes("effectiveType === '2g'")) throw new Error('Safe route prefetch missing.');
          for (const chunk of ['react-vendor','supabase-vendor','icons-vendor']) {
            if (!vite.includes(`'${chunk}'`)) throw new Error(`Missing vendor chunk: ${chunk}`);
          }
          console.log('Phase 2 route split contracts passed.');
          NODE
          git diff --check
